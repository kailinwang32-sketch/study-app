<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>考研 & 六级冲刺日程表</title>
    <style>
        :root {
            --bg-color: #FAF8F5; /* 奶油底色 */
            --card-bg: #FFFFFF;
            --text-main: #5C544D; /* 温柔深咖色 */
            --text-light: #9E968F;
            --accent-color: #D4C4B7; /* 奶茶点缀色 */
            --accent-hover: #C2B0A1;
            --success-color: #A3B899; /* 莫兰迪绿 */
            --border-color: #EFEBE6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding-top: 20px;
        }

        h1 {
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--text-main);
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        p.subtitle {
            font-size: 0.9rem;
            color: var(--text-light);
        }

        /* 列表页视图 */
        #list-view {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .day-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 18px 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            border: 1px solid var(--border-color);
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .day-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.04);
        }

        .day-card.rest-day {
            background-color: #FDFCFB;
            opacity: 0.8;
        }

        .day-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .day-date {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .day-status {
            font-size: 0.85rem;
            color: var(--text-light);
            background: var(--bg-color);
            padding: 2px 8px;
            border-radius: 10px;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background-color: var(--border-color);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .progress-fill {
            height: 100%;
            background-color: var(--success-color);
            transition: width 0.3s ease;
        }

        .task-preview {
            font-size: 0.85rem;
            color: var(--text-light);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 详情页视图 */
        #detail-view {
            display: none;
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            border: 1px solid var(--border-color);
            min-height: 400px;
        }

        .back-btn {
            background: none;
            border: none;
            color: var(--text-light);
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 20px;
            transition: color 0.2s;
        }

        .back-btn:hover {
            color: var(--text-main);
        }

        .detail-header {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px dashed var(--border-color);
        }

        .detail-date {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .task-group {
            margin-bottom: 20px;
        }

        .task-group-title {
            font-size: 0.95rem;
            color: var(--accent-color);
            margin-bottom: 10px;
            font-weight: 600;
        }

        .task-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 12px;
            padding: 10px;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .task-item:hover {
            background-color: var(--bg-color);
        }

        .checkbox {
            appearance: none;
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border: 2px solid var(--accent-color);
            border-radius: 5px;
            outline: none;
            cursor: pointer;
            position: relative;
            flex-shrink: 0;
            margin-top: 2px;
            transition: all 0.2s ease;
        }

        .checkbox:checked {
            background-color: var(--success-color);
            border-color: var(--success-color);
        }

        .checkbox:checked::after {
            content: '✓';
            position: absolute;
            color: white;
            font-size: 14px;
            left: 3px;
            top: -1px;
        }

        .task-label {
            font-size: 1rem;
            cursor: pointer;
            user-select: none;
            transition: color 0.2s;
        }

        .task-item input:checked + .task-label {
            color: var(--text-light);
            text-decoration: line-through;
        }

        .empty-state {
            text-align: center;
            color: var(--text-light);
            padding: 40px 0;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>2027考研二战南大控制专硕 & 六级冲刺</h1>
        <p class="subtitle">5.22 - 6.10 备考日程表</p>
    </header>

    <div id="list-view">
        <!-- 列表容器 -->
    </div>

    <div id="detail-view">
        <button class="back-btn" onclick="goBack()">← 返回列表</button>
        <div class="detail-header">
            <h2 class="detail-date" id="detail-date-title">5月22日</h2>
        </div>
        <div id="detail-tasks">
            <!-- 任务列表容器 -->
        </div>
    </div>
</div>

<script>
    // 基础数据配置
    const rawData = [
        { date: '5/22', isRest: false, newEng: '六级：听力第1套+写作', newMath: '数学新任务', newCtrl: '自控新任务', newWord: '单词日常' },
        { date: '5/23', isRest: false, newEng: '六级：阅读第2套+翻译', newMath: '数学新任务', newCtrl: '自控新任务', newWord: '单词日常' },
        { date: '5/24', isRest: false, newEng: '六级：听力第3套+写作①', newMath: '数学新任务', newCtrl: '自控新任务', newWord: '单词日常' },
        { date: '5/25', isRest: false, newEng: '六级：阅读第4套+翻译', newMath: '数学新任务', newCtrl: '自控新任务', newWord: '单词日常' },
        { date: '5/26', isRest: false, newEng: '六级：听力第5套+写作', newMath: '数学新任务', newCtrl: '自控新任务', newWord: '单词日常' },
        { date: '5/27', isRest: false, newEng: '六级：阅读第6套+翻译', newMath: '数学新任务', newCtrl: '自控新任务', newWord: '单词日常' },
        { date: '5/28', isRest: true,  newEng: '', newMath: '', newCtrl: '', newWord: '单词日常(休息日)' },
        { date: '5/29', isRest: false, newEng: '六级：听力第7套+写作②', newMath: '数学新任务', newCtrl: '自控新任务', newWord: '单词日常' },
        { date: '5/30', isRest: false, newEng: '六级：阅读第8套+翻译', newMath: '数学新任务', newCtrl: '自控新任务', newWord: '单词日常' },
        { date: '5/31', isRest: false, newEng: '六级：专项收尾', newMath: '数学新任务', newCtrl: '自控新任务', newWord: '单词日常' },
        { date: '6/1',  isRest: false, newEng: '六级：模拟①', newMath: '数学新任务', newCtrl: '自控新任务', newWord: '单词日常' },
        { date: '6/2',  isRest: false, newEng: '六级：模拟②', newMath: '数学新任务', newCtrl: '自控新任务', newWord: '单词日常' },
        { date: '6/3',  isRest: false, newEng: '六级：模拟③', newMath: '数学新任务', newCtrl: '自控新任务', newWord: '单词日常' },
        { date: '6/4',  isRest: true,  newEng: '', newMath: '', newCtrl: '', newWord: '单词日常(休息日)' },
        { date: '6/5',  isRest: false, newEng: '', newMath: '数学新任务', newCtrl: '自控新任务', newWord: '单词日常' },
        { date: '6/6',  isRest: false, newEng: '', newMath: '数学新任务', newCtrl: '自控新任务', newWord: '单词日常' },
        { date: '6/7',  isRest: false, newEng: '', newMath: '数学新任务', newCtrl: '自控新任务', newWord: '单词日常' },
        { date: '6/8',  isRest: false, newEng: '', newMath: '数学新任务', newCtrl: '自控新任务', newWord: '单词日常' },
        { date: '6/9',  isRest: false, newEng: '', newMath: '数学新任务', newCtrl: '自控新任务', newWord: '单词日常' },
        { date: '6/10', isRest: false, newEng: '', newMath: '数学新任务', newCtrl: '自控新任务', newWord: '单词日常' }
    ];

    // 硬编码复盘节点 (Target Date -> Items to review)
    const reviewMap = {
        '5/23': ['复盘: 5/22 六级听力/写作'],
        '5/24': ['复盘: 5/23 六级阅读/翻译'],
        '5/25': ['复盘: 5/22 六级听力/写作', '复盘: 5/24 六级听力/写作①', '复盘: 5/22 数学/自控'],
        '5/26': ['复盘: 5/23 六级阅读/翻译', '复盘: 5/25 六级阅读/翻译', '复盘: 5/23 数学/自控'],
        '5/27': ['复盘: 5/24 六级听力/写作①', '复盘: 5/26 六级听力/写作', '复盘: 5/24 数学/自控'],
        '5/29': ['复盘: 5/22 六级听力/写作', '复盘: 5/25 六级阅读/翻译', '复盘: 5/27 六级阅读/翻译', '复盘: 5/22 数学/自控', '复盘: 5/25 数学/自控', '复盘: 5/26 数学/自控'],
        '5/30': ['复盘: 5/23 六级阅读/翻译', '复盘: 5/26 六级听力/写作', '复盘: 5/29 六级听力/写作②', '复盘: 5/23 数学/自控', '复盘: 5/27 数学/自控'],
        '5/31': ['复盘: 5/24 六级听力/写作①', '复盘: 5/27 六级阅读/翻译', '复盘: 5/30 六级阅读/翻译', '复盘: 5/24 数学/自控'],
        '6/1':  ['复盘: 5/25 六级阅读/翻译', '复盘: 5/29 六级听力/写作②', '复盘: 5/31 六级专项收尾', '复盘: 5/25 数学/自控', '复盘: 5/29 数学/自控'],
        '6/2':  ['复盘: 5/26 六级听力/写作', '复盘: 5/30 六级阅读/翻译', '复盘: 6/1 六级模拟①', '复盘: 5/26 数学/自控', '复盘: 5/30 数学/自控'],
        '6/3':  ['复盘: 5/27 六级阅读/翻译', '复盘: 5/31 六级专项收尾', '复盘: 6/2 六级模拟②', '复盘: 5/27 数学/自控', '复盘: 5/31 数学/自控'],
        '6/5':  ['复盘: 5/29 六级听力/写作②', '复盘: 6/1 六级模拟①', '复盘: 6/3 六级模拟③', '复盘: 5/22 数学/自控', '复盘: 5/29 数学/自控'],
        '6/6':  ['复盘: 5/30 六级阅读/翻译', '复盘: 6/2 六级模拟②', '复盘: 5/23 数学/自控', '复盘: 5/30 数学/自控'],
        '6/7':  ['复盘: 5/31 六级专项收尾', '复盘: 6/3 六级模拟③', '复盘: 5/24 数学/自控', '复盘: 5/31 数学/自控'],
        '6/8':  ['复盘: 6/1 六级模拟①', '复盘: 5/25 数学/自控'],
        '6/9':  ['复盘: 6/2 六级模拟②', '复盘: 5/26 数学/自控'],
        '6/10': ['复盘: 6/3 六级模拟③', '复盘: 5/27 数学/自控']
    };

    let scheduleData = [];
    let currentActiveDate = null;

    // 初始化或读取数据
    function initData() {
        const localData = localStorage.getItem('nd_study_schedule_v1');
        if (localData) {
            scheduleData = JSON.parse(localData);
        } else {
            // 生成初始数据结构
            scheduleData = rawData.map(day => {
                let tasks = [];
                
                // 1. 单词（每天都有）
                if (day.newWord) tasks.push({ id: `${day.date}-word`, type: 'new', text: day.newWord, done: false });
                
                // 2. 新任务
                if (!day.isRest) {
                    if (day.newEng) tasks.push({ id: `${day.date}-eng`, type: 'new', text: day.newEng, done: false });
                    if (day.newMath) tasks.push({ id: `${day.date}-math`, type: 'new', text: day.newMath, done: false });
                    if (day.newCtrl) tasks.push({ id: `${day.date}-ctrl`, type: 'new', text: day.newCtrl, done: false });
                }

                // 3. 复盘任务
                const reviews = reviewMap[day.date] || [];
                reviews.forEach((rev, idx) => {
                    tasks.push({ id: `${day.date}-rev-${idx}`, type: 'review', text: rev, done: false });
                });

                return {
                    date: day.date,
                    isRest: day.isRest,
                    tasks: tasks
                };
            });
            saveData();
        }
    }

    // 保存到 localStorage
    function saveData() {
        localStorage.setItem('nd_study_schedule_v1', JSON.stringify(scheduleData));
    }

    // 渲染列表页
    function renderList() {
        const listContainer = document.getElementById('list-view');
        listContainer.innerHTML = '';

        scheduleData.forEach((day, index) => {
            const totalTasks = day.tasks.length;
            const completedTasks = day.tasks.filter(t => t.done).length;
            const progressPercent = totalTasks === 0 ? 100 : Math.round((completedTasks / totalTasks) * 100);
            
            // 提取前两个任务作为概览展示
            const previewText = day.tasks.length > 0 
                ? day.tasks.slice(0, 2).map(t => t.text).join(' | ') + (day.tasks.length > 2 ? '...' : '')
                : '全天休息';

            const card = document.createElement('div');
            card.className = `day-card ${day.isRest ? 'rest-day' : ''}`;
            card.onclick = () => openDetail(index);

            card.innerHTML = `
                <div class="day-header">
                    <span class="day-date">${day.date} ${day.isRest ? '🌿 休息日' : '📝 备考日'}</span>
                    <span class="day-status">${completedTasks}/${totalTasks}</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" style="width: ${progressPercent}%"></div>
                </div>
                <div class="task-preview">${previewText}</div>
            `;
            listContainer.appendChild(card);
        });
    }

    // 打开详情页
    function openDetail(index) {
        currentActiveDate = index;
        document.getElementById('list-view').style.display = 'none';
        document.getElementById('detail-view').style.display = 'block';
        window.scrollTo(0, 0);
        renderDetail();
    }

    // 返回列表页
    function goBack() {
        document.getElementById('detail-view').style.display = 'none';
        document.getElementById('list-view').style.display = 'flex';
        currentActiveDate = null;
        renderList(); // 更新外层进度条
    }

    // 渲染详情页内容
    function renderDetail() {
        if (currentActiveDate === null) return;
        
        const dayData = scheduleData[currentActiveDate];
        document.getElementById('detail-date-title').innerText = `${dayData.date} 任务清单`;
        
        const container = document.getElementById('detail-tasks');
        container.innerHTML = '';

        if (dayData.tasks.length === 0) {
            container.innerHTML = '<div class="empty-state">今天没有任何任务，好好休息吧！☕</div>';
            return;
        }

        // 分组显示：今日新任务 & 今日复盘
        const newTasks = dayData.tasks.filter(t => t.type === 'new');
        const reviewTasks = dayData.tasks.filter(t => t.type === 'review');

        if (newTasks.length > 0) {
            container.appendChild(createTaskGroup('今日新任务', newTasks));
        }

        if (reviewTasks.length > 0) {
            container.appendChild(createTaskGroup('今日复盘 (艾宾浩斯)', reviewTasks));
        }
    }

    // 创建任务组DOM
    function createTaskGroup(title, tasks) {
        const group = document.createElement('div');
        group.className = 'task-group';
        
        const titleEl = document.createElement('div');
        titleEl.className = 'task-group-title';
        titleEl.innerText = title;
        group.appendChild(titleEl);

        tasks.forEach(task => {
            const item = document.createElement('label');
            item.className = 'task-item';
            
            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.className = 'checkbox';
            checkbox.checked = task.done;
            checkbox.onchange = (e) => toggleTask(task.id, e.target.checked);

            const label = document.createElement('span');
            label.className = 'task-label';
            label.innerText = task.text;

            item.appendChild(checkbox);
            item.appendChild(label);
            group.appendChild(item);
        });

        return group;
    }

    // 切换任务状态
    function toggleTask(taskId, isDone) {
        const dayData = scheduleData[currentActiveDate];
        const task = dayData.tasks.find(t => t.id === taskId);
        if (task) {
            task.done = isDone;
            saveData();
        }
    }

    // 启动应用
    initData();
    renderList();

</script>
</body>
</html>
