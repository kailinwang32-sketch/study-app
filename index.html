<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        :root {
            --bg-color: #FAF8F5;
            --card-bg: #FFFFFF;
            --text-main: #5C544D;
            --text-light: #9E968F;
            --accent-color: #D4C4B7;
            --success-color: #A3B899;
            --border-color: #EFEBE6;
            --blue-light: #B4CDE6;   
            --blue-heat-1: #E1EAF4;  
            --blue-heat-2: #9ABCE0;  
            --blue-heat-3: #6A9BCC;  
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            padding: 20px 15px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding-bottom: 60px;
        }

        .header-goal {
            text-align: center;
            margin-bottom: 20px;
            padding: 10px 0;
        }
        .header-goal h1 {
            font-size: 1.2rem;
            color: var(--text-main);
            letter-spacing: 1px;
            font-weight: 600;
        }
        .header-goal .countdown {
            font-size: 0.85rem;
            color: var(--text-light);
            margin-top: 4px;
            letter-spacing: 0.5px;
        }

        .heatmap-container {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
        }
        .heatmap-title {
            font-size: 0.85rem; color: var(--text-light); margin-bottom: 10px; text-align: center; letter-spacing: 1px;
        }
        .heatmap-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 6px;
            justify-content: center;
        }
        .heat-cell {
            aspect-ratio: 1 / 1;
            border-radius: 4px;
            background-color: var(--bg-color);
            transition: background-color 0.4s ease;
        }
        .heat-cell[data-level="1"] { background-color: var(--blue-heat-1); }
        .heat-cell[data-level="2"] { background-color: var(--blue-heat-2); }
        .heat-cell[data-level="3"] { background-color: var(--blue-heat-3); }

        .timeline-wrapper {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 15px 10px;
            margin-bottom: 15px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            overflow-x: auto;
            white-space: nowrap;
            scrollbar-width: none; 
        }
        .timeline-wrapper::-webkit-scrollbar { display: none; }
        .timeline { display: flex; gap: 12px; align-items: center; }
        .timeline-item { display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; min-width: 30px; }
        .circle { width: 14px; height: 14px; border-radius: 50%; border: 2px solid var(--border-color); background-color: transparent; transition: all 0.3s ease; }
        .circle.completed { background-color: var(--blue-light); border-color: var(--blue-light); }
        .circle.rest { border-style: dashed; border-color: #D3D3D3; }
        .circle-label { font-size: 0.75rem; color: var(--text-light); }

        #list-view { display: flex; flex-direction: column; gap: 15px; }
        .day-card { background-color: var(--card-bg); border-radius: 12px; padding: 18px 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.02); border: 1px solid var(--border-color); cursor: pointer; transition: transform 0.2s ease; }
        .day-card:hover { transform: translateY(-2px); }
        .day-card.rest-day { background-color: #FDFCFB; opacity: 0.8; }
        .day-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .day-date { font-size: 1.1rem; font-weight: 600; }
        .day-status { font-size: 0.85rem; color: var(--text-light); background: var(--bg-color); padding: 4px 10px; border-radius: 12px; font-weight: 500; }
        .progress-bar { width: 100%; height: 6px; background-color: var(--border-color); border-radius: 3px; overflow: hidden; margin-bottom: 10px; }
        .progress-fill { height: 100%; background-color: var(--success-color); transition: width 0.3s ease; }
        .task-preview { font-size: 0.85rem; color: var(--text-light); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        #detail-view { display: none; background-color: var(--card-bg); border-radius: 16px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); border: 1px solid var(--border-color); min-height: 400px; }
        .back-btn { background: none; border: none; color: var(--text-light); font-size: 1rem; cursor: pointer; display: flex; align-items: center; gap: 5px; margin-bottom: 20px; }
        .detail-header { margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px dashed var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .detail-date { font-size: 1.5rem; font-weight: 600; }
        .detail-progress { font-size: 0.9rem; color: var(--success-color); font-weight: 600; }
        .task-group { margin-bottom: 25px; background: #FAFAFA; padding: 15px; border-radius: 12px; border: 1px solid #F0F0F0; }
        .task-group-title { font-size: 0.95rem; color: var(--text-main); margin-bottom: 15px; font-weight: 600; }
        .task-item { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 12px; padding: 8px 10px; border-radius: 8px; }
        .task-content { display: flex; align-items: flex-start; gap: 12px; flex: 1; }
        .checkbox { appearance: none; -webkit-appearance: none; width: 20px; height: 20px; border: 2px solid var(--accent-color); border-radius: 5px; outline: none; cursor: pointer; position: relative; flex-shrink: 0; margin-top: 2px; }
        .checkbox:checked { background-color: var(--success-color); border-color: var(--success-color); }
        .checkbox:checked::after { content: '✓'; position: absolute; color: white; font-size: 14px; left: 3px; top: -1px; }
        .task-text-wrapper { display: flex; flex-direction: column; }
        .task-label { font-size: 0.95rem; cursor: pointer; user-select: none; line-height: 1.4; word-break: break-all; }
        .task-item input:checked + .task-text-wrapper .task-label { color: var(--text-light); text-decoration: line-through; }
        .task-note { font-size: 0.8rem; color: var(--text-light); margin-top: 4px; background: var(--bg-color); padding: 4px 8px; border-radius: 6px; border-left: 2px solid var(--accent-color); }
        .task-actions { display: flex; gap: 8px; opacity: 0.8; }
        .icon-btn { background: none; border: none; font-size: 1.1rem; cursor: pointer; padding: 2px; }

        .add-task-container { margin-top: 30px; background: #FAFAFA; padding: 15px; border-radius: 12px; border: 1px dashed var(--accent-color); display: flex; flex-direction: column; gap: 10px; }
        .add-task-container select, .add-task-container input { padding: 10px; border: 1px solid var(--border-color); border-radius: 8px; outline: none; }
        .add-task-container button { background: var(--accent-color); color: white; border: none; padding: 10px; border-radius: 8px; font-weight: 600; cursor: pointer; }
        .settings-btn-wrap { text-align: center; margin-top: 30px; }
        .settings-btn { background: none; border: none; color: var(--text-light); font-size: 0.9rem; cursor: pointer; text-decoration: underline; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: var(--card-bg); width: 85%; max-width: 400px; padding: 30px 25px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; position: relative; overflow: hidden; }
        .modal-content textarea { width: 100%; margin: 15px 0; border: 1px solid var(--border-color); border-radius: 8px; padding: 10px; font-size: 0.85rem; outline: none; }
        .modal-actions { display: flex; gap: 10px; justify-content: center; margin-top: 15px; }
        .modal-actions button { padding: 10px 15px; border: none; border-radius: 8px; cursor: pointer; background: var(--border-color); color: var(--text-main); font-weight: 600; }
        .modal-actions button.primary { background: var(--accent-color); color: white; width: 100%; }

        .card-decoration { font-size: 2.5rem; margin-bottom: 10px; }
        .card-title { font-size: 1.2rem; color: var(--text-main); font-weight: 600; margin-bottom: 8px; }
        .card-subtitle { font-size: 0.85rem; color: var(--accent-color); letter-spacing: 2px; margin-bottom: 20px; text-transform: uppercase; }
        .card-text { font-size: 0.95rem; color: var(--text-main); line-height: 1.8; margin-bottom: 25px; text-align: left; background: var(--bg-color); padding: 15px; border-radius: 10px; border-left: 3px solid var(--accent-color); }
    </style>
</head>

    </div>

    <div id="detail-view">

        </div>
    </div>
</div>

<div class="modal-overlay" id="card-modal">

        <div class="modal-actions">

        </div>
    </div>
</div>

<div class="modal-overlay" id="settings-modal">

        <p style="font-size:0.8rem; color:var(--text-light); margin-top:5px;">跨设备同步您的所有打卡与备注进度</p>

        <div class="modal-actions" style="flex-direction:row;">

            <button class="primary" onclick="restoreBackup()" style="flex:1; width:auto;">粘贴恢复</button>
        </div>
        <button onclick="closeSettings()" style="width:100%; margin-top:10px; background:transparent; border:1px solid var(--border-color); border-radius:8px; padding:10px;">关闭</button>
    </div>
</div>

                { id: '611-4', subject: 'english', text: '六级·轻量：只看写作模板和翻译核心词，不做新题', done: false, note: '' },
                { id: '611-5', subject: 'english', text: '考试准备：再次确认准考证、文具，22点前入睡 🛌', done: false, note: '' }
            ]
        },
        {
            date: '6/12', isRest: false,
            tasks: [
                { id: '612-1', subject: 'english', text: '🎯 六级考试日 · 祝顺遂无虞，沉着应对，一战过关！', done: false, note: '' }
            ]
        }
    ];

    const guidanceCards = [
        { icon: '🌙', title: '塔罗：隐士 (The Hermit)', text: '今日宜切断外界干扰。不需要比较进度，向内求索，适合静下心来死磕自动控制原理的难点或高数大题。' },
        { icon: '⚓', title: '雷诺曼：锚 (Anchor)', text: '稳定你的内核。考研二战会有波澜，但外界的繁杂与你无关，只需锚定南京大学的目标，扎实推进今天的每一个复盘。' },
        { icon: '🗝️', title: '雷诺曼：钥匙 (Key)', text: '突破瓶颈的契机！今天在做数学题或推导控制系统模型时，你极概率会灵光一闪，找到解题的关键思路。' },
        { icon: '🐎', title: '塔罗：战车 (The Chariot)', text: '行动力与掌控力的完美结合。冲刺阶段需要极强的自律，今天你将充满干劲，适合大量推进六级真题与专业课进度。' },
        { icon: '⭐', title: '塔罗：星星 (The Star)', text: '充满希望与灵感的一天。保持对南大控制专硕的憧憬，这份纯粹的愿力会转化为你此刻笔下的动力，一切都在正轨上。' },
        { icon: '👑', title: '塔罗：皇帝 (The Emperor)', text: '重塑秩序与掌控局势。不要被未知的考题吓倒，拿出你的气场，今天适合构建数学框架与梳理专业课全局。' }
    ];

    let scheduleData = [];
    let currentActiveDate = null;
    const STORAGE_KEY = 'nd_study_schedule_v7';
    const EXAM_DATE = new Date('2026-06-12T00:00:00'); // 六级目标终点日期

    function initData() {
        const localData = localStorage.getItem(STORAGE_KEY);
        if (localData) {
            scheduleData = JSON.parse(localData);
        } else {
            scheduleData = initialScheduleData;
            saveData();
        }
    }

    function saveData() { localStorage.setItem(STORAGE_KEY, JSON.stringify(scheduleData)); }

    function updateCountdown() {
        const today = new Date();
        const diffTime = EXAM_DATE - today;
        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        const cdText = document.getElementById('countdown-text');
        if (diffDays > 0) {
            cdText.innerText = `距离 六级考试日 还有 ${diffDays} 天`;
        } else if (diffDays === 0) {
            cdText.innerText = "就是今天！稳扎稳打，绝地反击！🎯";
        } else {
            cdText.innerText = "考试已结束，不问终局，未来可期！🌿";
        }
    }

    function renderHeatmap() {
        const grid = document.getElementById('heatmap-grid');
        grid.innerHTML = '';
        scheduleData.forEach((day) => {
            const totalTasks = day.tasks.length;
            const completedTasks = day.tasks.filter(t => t.done).length;
            
            let level = 0;
            if (totalTasks > 0) {
                const percent = completedTasks / totalTasks;
                if (percent === 1) level = 3;
                else if (percent >= 0.5) level = 2;
                else if (percent > 0) level = 1;
            }

            const cell = document.createElement('div');
            cell.className = 'heat-cell';
            if (day.isRest && totalTasks <= 1) {
                cell.style.backgroundColor = 'transparent';
                cell.style.border = '1px dashed var(--border-color)';
            } else {
                cell.setAttribute('data-level', level);
            }
            grid.appendChild(cell);
        });
    }

    function renderTimeline() {
        const timeline = document.getElementById('timeline');
        timeline.innerHTML = '';
        scheduleData.forEach((day, index) => {
            const totalTasks = day.tasks.length;
            const completedTasks = day.tasks.filter(t => t.done).length;
            const isCompleted = totalTasks > 0 && completedTasks === totalTasks;
            
            const item = document.createElement('div');
            item.className = 'timeline-item';
            const dayNum = day.date.split('/')[1];
            
            let circleClass = 'circle';
            if (day.isRest && totalTasks <= 1) circleClass += ' rest';
            else if (isCompleted) circleClass += ' completed';
            
            item.innerHTML = `<div class="${circleClass}"></div><div class="circle-label">${dayNum}</div>`;
            item.onclick = () => { if(currentActiveDate !== index) openDetail(index); };
            timeline.appendChild(item);
        });
    }

    function renderList() {
        const listContainer = document.getElementById('list-view');
        listContainer.innerHTML = '';

        scheduleData.forEach((day, index) => {
            const totalTasks = day.tasks.length;
            const completedTasks = day.tasks.filter(t => t.done).length;
            const progressPercent = totalTasks === 0 ? 100 : Math.round((completedTasks / totalTasks) * 100);
            
            const previewText = day.tasks.length > 0 
                ? day.tasks.slice(0, 2).map(t => t.text).join(' | ') + (day.tasks.length > 2 ? '...' : '')
                : '休息日';

            const card = document.createElement('div');
            card.className = `day-card ${day.isRest ? 'rest-day' : ''}`;
            card.onclick = () => openDetail(index);

            card.innerHTML = `
                <div class="day-header">
                    <span class="day-date">${day.date} ${day.isRest ? '🌿 休息日' : '📝 备考日'}</span>
                    <span class="day-status">完成度 ${progressPercent}%</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" style="width: ${progressPercent}%"></div>
                </div>
                <div class="task-preview">${previewText}</div>
            `;
            listContainer.appendChild(card);
        });
        
        renderTimeline(); 
        renderHeatmap();
    }

    function openDetail(index) {
        currentActiveDate = index;
        document.getElementById('list-view').style.display = 'none';
        document.getElementById('settings-wrap').style.display = 'none';
        document.getElementById('global-modules').style.display = 'none';
        document.getElementById('global-timeline').style.display = 'none';
        document.getElementById('detail-view').style.display = 'block';
        window.scrollTo(0, 0);
        renderDetail();
    }

    function goBack() {
        document.getElementById('detail-view').style.display = 'none';
        document.getElementById('list-view').style.display = 'flex';
        document.getElementById('settings-wrap').style.display = 'block';
        document.getElementById('global-modules').style.display = 'block';
        document.getElementById('global-timeline').style.display = 'block';
        currentActiveDate = null;
        renderList(); 
    }

    function renderDetail() {
        if (currentActiveDate === null) return;
        const dayData = scheduleData[currentActiveDate];
        updateDetailProgress(dayData);
        document.getElementById('detail-date-title').innerText = `${dayData.date}`;
        
        const container = document.getElementById('detail-tasks');
        container.innerHTML = '';

        if (dayData.tasks.length === 0) {
            container.innerHTML = '<div class="empty-state">今天没有任何任务，好好休息吧！☕</div>';
            return;
        }

        const englishTasks = dayData.tasks.filter(t => t.subject === 'english');
        const mathTasks = dayData.tasks.filter(t => t.subject === 'math');
        const profTasks = dayData.tasks.filter(t => t.subject === 'prof');

        if (englishTasks.length > 0) container.appendChild(createTaskGroup('📚 英语 (六级 & 单词)', englishTasks));
        if (mathTasks.length > 0) container.appendChild(createTaskGroup('📐 数学', mathTasks));
        if (profTasks.length > 0) container.appendChild(createTaskGroup('💻 专业课', profTasks));
    }

    function updateDetailProgress(dayData) {
        const totalTasks = dayData.tasks.length;
        const completedTasks = dayData.tasks.filter(t => t.done).length;
        const progressPercent = totalTasks === 0 ? 100 : Math.round((completedTasks / totalTasks) * 100);
        document.getElementById('detail-progress-text').innerText = `已完成 ${progressPercent}%`;
    }

    function createTaskGroup(title, tasks) {
        const group = document.createElement('div');
        group.className = 'task-group';
        
        const titleEl = document.createElement('div');
        titleEl.className = 'task-group-title';
        titleEl.innerText = title;
        group.appendChild(titleEl);

        tasks.forEach(task => {
            const item = document.createElement('div');
            item.className = 'task-item';
            
            const contentDiv = document.createElement('label');
            contentDiv.className = 'task-content';
            
            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.className = 'checkbox';
            checkbox.checked = task.done;
            checkbox.onchange = (e) => toggleTask(task.id, e.target.checked);

            const textWrapper = document.createElement('div');
            textWrapper.className = 'task-text-wrapper';
            
            const label = document.createElement('span');
            label.className = 'task-label';
            label.innerText = task.text;
            textWrapper.appendChild(label);

            if (task.note && task.note.trim() !== '') {
                const noteEl = document.createElement('div');
                noteEl.className = 'task-note';
                noteEl.innerText = `💡 ${task.note}`;
                textWrapper.appendChild(noteEl);
            }

            contentDiv.appendChild(checkbox);
            contentDiv.appendChild(textWrapper);

            const actionsDiv = document.createElement('div');
            actionsDiv.className = 'task-actions';

            const noteBtn = document.createElement('button');
            noteBtn.className = 'icon-btn';
            noteBtn.innerText = '📝';
            noteBtn.onclick = () => addNote(task.id, task.note);

            const editBtn = document.createElement('button');
            editBtn.className = 'icon-btn';
            editBtn.innerText = '✏️';
            editBtn.onclick = () => editTask(task.id, task.text);

            const delBtn = document.createElement('button');
            delBtn.className = 'icon-btn';
            delBtn.innerText = '🗑️';
            delBtn.onclick = () => deleteTask(task.id);

            actionsDiv.appendChild(noteBtn);
            actionsDiv.appendChild(editBtn);
            actionsDiv.appendChild(delBtn);

            item.appendChild(contentDiv);
            item.appendChild(actionsDiv);
            group.appendChild(item);
        });

        return group;
    }

    function toggleTask(taskId, isDone) {
        const dayData = scheduleData[currentActiveDate];
        const task = dayData.tasks.find(t => t.id === taskId);
        if (task) {
            task.done = isDone;
            saveData();
            updateDetailProgress(dayData);
        }
    }

    function addNewTask() {
        const subject = document.getElementById('new-task-subject').value;
        const textInput = document.getElementById('new-task-text');
        const text = textInput.value.trim();
        if (!text) { alert('请输入任务内容！'); return; }

        const dayData = scheduleData[currentActiveDate];
        dayData.tasks.push({ id: `custom-${Date.now()}`, subject: subject, text: text, done: false, note: '' });
        textInput.value = ''; 
        saveData();
        renderDetail(); 
    }

    function editTask(taskId, oldText) {
        const newText = prompt('修改任务内容：', oldText);
        if (newText !== null && newText.trim() !== '') {
            const task = scheduleData[currentActiveDate].tasks.find(t => t.id === taskId);
            if (task) { task.text = newText.trim(); saveData(); renderDetail(); }
        }
    }

    function addNote(taskId, oldNote) {
        const newNote = prompt('添加复盘备注/错题记录（留空则删除备注）：', oldNote || '');
        if (newNote !== null) {
            const task = scheduleData[currentActiveDate].tasks.find(t => t.id === taskId);
            if (task) { task.note = newNote.trim(); saveData(); renderDetail(); }
        }
    }

    function deleteTask(taskId) {
        if (confirm('确定要删除这个任务吗？')) {
            const dayData = scheduleData[currentActiveDate];
            const taskIndex = dayData.tasks.findIndex(t => t.id === taskId);
            if (taskIndex > -1) {
                dayData.tasks.splice(taskIndex, 1);
                saveData(); renderDetail();
            }
        }
    }

    function openSettings() {
        document.getElementById('settings-modal').style.display = 'flex';
        document.getElementById('backup-data').value = JSON.stringify(scheduleData);
    }
    function closeSettings() { document.getElementById('settings-modal').style.display = 'none'; }
    function copyBackup() {
        const textarea = document.getElementById('backup-data');
        textarea.select(); document.execCommand('copy');
        alert('数据已复制成功！');
    }
    function restoreBackup() {
        const jsonStr = document.getElementById('backup-data').value.trim();
        if(!jsonStr) { alert('请先粘贴备份数据！'); return; }
        try {
            const parsedData = JSON.parse(jsonStr);
            if(Array.isArray(parsedData) && parsedData.length > 0) {
                scheduleData = parsedData; saveData(); closeSettings(); renderList(); alert('进度恢复成功！');
            } else { alert('数据格式不正确！'); }
        } catch(e) { alert('粘贴的内容有效性错误，请检查！'); }
    }

    function checkDailyCard() {
        const todayStr = new Date().toLocaleDateString();
        const lastDraw = localStorage.getItem('nd_card_draw_v7');
        
        if (lastDraw !== todayStr) {
            const randomCard = guidanceCards[Math.floor(Math.random() * guidanceCards.length)];
            document.getElementById('daily-card-icon').innerText = randomCard.icon;
            document.getElementById('daily-card-title').innerText = randomCard.title;
            document.getElementById('daily-card-content').innerText = randomCard.text;
            document.getElementById('card-modal').style.display = 'flex';
            localStorage.setItem('nd_card_draw_v7', todayStr);
        }
    }
    function closeCardModal() { document.getElementById('card-modal').style.display = 'none'; }

    updateCountdown();
    initData();
    renderList();
    setTimeout(checkDailyCard, 600);

</script>
</body>
</html>
