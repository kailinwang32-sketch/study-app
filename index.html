<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>备考日程表</title>
    <style>
        :root {
            --bg-color: #FAF8F5;
            --card-bg: #FFFFFF;
            --text-main: #5C544D;
            --text-light: #9E968F;
            --accent-color: #D4C4B7;
            --success-color: #A3B899;
            --border-color: #EFEBE6;
            --blue-light: #B4CDE6; /* 治愈系浅蓝 */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            padding: 20px 15px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding-bottom: 60px;
        }

        /* 顶部时间轴 (小圆圈) */
        .timeline-wrapper {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 15px 10px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            overflow-x: auto;
            white-space: nowrap;
            /* 隐藏滚动条但保留功能 */
            scrollbar-width: none; 
        }
        .timeline-wrapper::-webkit-scrollbar {
            display: none;
        }

        .timeline {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .timeline-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            min-width: 30px;
        }

        .circle {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 2px solid var(--border-color);
            background-color: transparent;
            transition: all 0.3s ease;
        }

        .circle.completed {
            background-color: var(--blue-light);
            border-color: var(--blue-light);
        }

        .circle.rest {
            border-style: dashed;
            border-color: #D3D3D3;
        }

        .circle-label {
            font-size: 0.75rem;
            color: var(--text-light);
        }

        /* 列表页视图 */
        #list-view {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .day-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 18px 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            border: 1px solid var(--border-color);
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .day-card:hover {
            transform: translateY(-2px);
        }

        .day-card.rest-day {
            background-color: #FDFCFB;
            opacity: 0.8;
        }

        .day-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .day-date {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .day-status {
            font-size: 0.85rem;
            color: var(--text-light);
            background: var(--bg-color);
            padding: 4px 10px;
            border-radius: 12px;
            font-weight: 500;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background-color: var(--border-color);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .progress-fill {
            height: 100%;
            background-color: var(--success-color);
            transition: width 0.3s ease;
        }

        .task-preview {
            font-size: 0.85rem;
            color: var(--text-light);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 详情页视图 */
        #detail-view {
            display: none;
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            border: 1px solid var(--border-color);
            min-height: 400px;
        }

        .back-btn {
            background: none;
            border: none;
            color: var(--text-light);
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 20px;
        }

        .detail-header {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px dashed var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .detail-date { font-size: 1.5rem; font-weight: 600; }
        .detail-progress { font-size: 0.9rem; color: var(--success-color); font-weight: 600; }

        .task-group {
            margin-bottom: 25px;
            background: #FAFAFA;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #F0F0F0;
        }

        .task-group-title {
            font-size: 0.95rem;
            color: var(--text-main);
            margin-bottom: 15px;
            font-weight: 600;
        }

        .task-item {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 12px;
            padding: 8px 10px;
            border-radius: 8px;
        }

        .task-content {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            flex: 1;
        }

        .checkbox {
            appearance: none;
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border: 2px solid var(--accent-color);
            border-radius: 5px;
            outline: none;
            cursor: pointer;
            position: relative;
            flex-shrink: 0;
            margin-top: 2px;
        }
        .checkbox:checked { background-color: var(--success-color); border-color: var(--success-color); }
        .checkbox:checked::after { content: '✓'; position: absolute; color: white; font-size: 14px; left: 3px; top: -1px; }

        .task-text-wrapper {
            display: flex;
            flex-direction: column;
        }

        .task-label {
            font-size: 0.95rem;
            cursor: pointer;
            user-select: none;
            line-height: 1.4;
            word-break: break-all;
        }
        .task-item input:checked + .task-text-wrapper .task-label { color: var(--text-light); text-decoration: line-through; }

        .task-note {
            font-size: 0.8rem;
            color: var(--text-light);
            margin-top: 4px;
            background: var(--bg-color);
            padding: 4px 8px;
            border-radius: 6px;
            border-left: 2px solid var(--accent-color);
        }

        .task-actions {
            display: flex;
            gap: 8px;
            opacity: 0.8;
        }
        .icon-btn { background: none; border: none; font-size: 1.1rem; cursor: pointer; padding: 2px; }

        /* 底部增加/设置区域 */
        .add-task-container {
            margin-top: 30px;
            background: #FAFAFA;
            padding: 15px;
            border-radius: 12px;
            border: 1px dashed var(--accent-color);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .add-task-container select, .add-task-container input {
            padding: 10px; border: 1px solid var(--border-color); border-radius: 8px; outline: none;
        }
        .add-task-container button {
            background: var(--accent-color); color: white; border: none; padding: 10px; border-radius: 8px; font-weight: 600; cursor: pointer;
        }

        .settings-btn-wrap {
            text-align: center;
            margin-top: 30px;
        }
        .settings-btn {
            background: none; border: none; color: var(--text-light); font-size: 0.9rem; cursor: pointer; text-decoration: underline;
        }

        /* 弹窗样式 (抽卡与设置通用) */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); z-index: 1000; justify-content: center; align-items: center;
        }
        .modal-content {
            background: var(--card-bg); width: 85%; max-width: 400px; padding: 25px; border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center;
        }
        .modal-content textarea {
            width: 100%; margin: 15px 0; border: 1px solid var(--border-color); border-radius: 8px; padding: 10px; font-size: 0.85rem; outline: none;
        }
        .modal-actions {
            display: flex; gap: 10px; justify-content: center; margin-top: 15px;
        }
        .modal-actions button {
            padding: 8px 15px; border: none; border-radius: 6px; cursor: pointer; background: var(--border-color); color: var(--text-main);
        }
        .modal-actions button.primary { background: var(--accent-color); color: white; }

        /* 抽卡特定样式 */
        .card-title { font-size: 1.1rem; color: var(--accent-color); font-weight: 600; margin-bottom: 15px; }
        .card-text { font-size: 1rem; color: var(--text-main); line-height: 1.6; margin-bottom: 20px; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <div class="timeline-wrapper">
        <div class="timeline" id="timeline"></div>
    </div>

    <div id="list-view"></div>
    
    <div class="settings-btn-wrap" id="settings-wrap">
        <button class="settings-btn" onclick="openSettings()">⚙️ 备份与恢复进度</button>
    </div>

    <div id="detail-view">
        <button class="back-btn" onclick="goBack()">← 返回日程</button>
        <div class="detail-header">
            <h2 class="detail-date" id="detail-date-title"></h2>
            <span class="detail-progress" id="detail-progress-text"></span>
        </div>
        <div id="detail-tasks"></div>

        <div class="add-task-container">
            <select id="new-task-subject">
                <option value="english">📚 英语 (六级 & 单词)</option>
                <option value="math">📐 数学</option>
                <option value="prof">💻 专业课</option>
            </select>
            <input type="text" id="new-task-text" placeholder="输入你想增加的任务内容..." />
            <button onclick="addNewTask()">＋ 添加任务到今天</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="card-modal">
    <div class="modal-content">
        <div class="card-title">✨ 今日能量指引</div>
        <div class="card-text" id="daily-card-content"></div>
        <div class="modal-actions">
            <button class="primary" onclick="closeCardModal()" style="width:100%">开启专注的一天</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="settings-modal">
    <div class="modal-content">
        <h3 style="font-size:1.1rem; color:var(--text-main);">数据备份与恢复</h3>
        <p style="font-size:0.8rem; color:var(--text-light); margin-top:5px;">复制下方代码保存，或粘贴以前的代码恢复进度</p>
        <textarea id="backup-data" rows="6"></textarea>
        <div class="modal-actions">
            <button onclick="copyBackup()">复制备份</button>
            <button class="primary" onclick="restoreBackup()">粘贴恢复</button>
        </div>
        <div class="modal-actions" style="margin-top:10px">
            <button onclick="closeSettings()" style="width:100%; background:transparent; border:1px solid var(--border-color);">关闭</button>
        </div>
    </div>
</div>

        "食神生财：专注自身的产出与积累，所有的努力终会化为实质的收获。",
        "女祭司：保持内心的平静与直觉，适合深度思考专业课的一天。",
        "Lenormand 锚：稳定你的内核。外界的繁杂与你无关，只需锚定你的目标。",
        "太阳正位：拨云见日，今天的思绪会格外清晰，相信自己的力量。"
    ];

    let scheduleData = [];
    let currentActiveDate = null;
    const STORAGE_KEY = 'nd_study_schedule_v5';

    function initData() {
        const localData = localStorage.getItem(STORAGE_KEY);
        if (localData) {
            scheduleData = JSON.parse(localData);
        } else {
            scheduleData = rawData.map(day => {
                let tasks = [];
                // 增加了 note 属性
                if (day.newWord) tasks.push({ id: `${day.date}-word`, subject: 'english', text: day.newWord, done: false, note: '' });
                if (!day.isRest && day.newEng) tasks.push({ id: `${day.date}-eng`, subject: 'english', text: day.newEng, done: false, note: '' });
                if (!day.isRest && day.newMath) tasks.push({ id: `${day.date}-math`, subject: 'math', text: day.newMath, done: false, note: '' });
                if (!day.isRest && day.newProf) tasks.push({ id: `${day.date}-prof`, subject: 'prof', text: day.newProf, done: false, note: '' });

                const reviews = reviewMap[day.date] || [];
                reviews.forEach((rev, idx) => {
                    let subj = 'english';
                    if (rev.includes('数学')) subj = 'math';
                    if (rev.includes('专业课')) subj = 'prof';
                    tasks.push({ id: `${day.date}-rev-${idx}`, subject: subj, text: rev, done: false, note: '' });
                });

                return { date: day.date, isRest: day.isRest, tasks: tasks };
            });
            saveData();
        }
    }

    function saveData() { localStorage.setItem(STORAGE_KEY, JSON.stringify(scheduleData)); }

    // 渲染顶部时间轴圆圈
    function renderTimeline() {
        const timeline = document.getElementById('timeline');
        timeline.innerHTML = '';
        
        scheduleData.forEach((day, index) => {
            const totalTasks = day.tasks.length;
            const completedTasks = day.tasks.filter(t => t.done).length;
            const isCompleted = totalTasks > 0 && completedTasks === totalTasks;
            
            const item = document.createElement('div');
            item.className = 'timeline-item';
            
            // 提取日期中的天数，如 5/22 提取出 22
            const dayNum = day.date.split('/')[1];
            
            let circleClass = 'circle';
            if (day.isRest && totalTasks <= 1) circleClass += ' rest'; // 休息日虚线圈
            else if (isCompleted) circleClass += ' completed'; // 完成变浅蓝色
            
            item.innerHTML = `
                <div class="${circleClass}"></div>
                <div class="circle-label">${dayNum}</div>
            `;
            
            // 点击圆圈直接跳转到该天
            item.onclick = () => {
                if(currentActiveDate !== index) openDetail(index);
            };
            
            timeline.appendChild(item);
        });
    }

    function renderList() {
        const listContainer = document.getElementById('list-view');
        listContainer.innerHTML = '';

        scheduleData.forEach((day, index) => {
            const totalTasks = day.tasks.length;
            const completedTasks = day.tasks.filter(t => t.done).length;
            const progressPercent = totalTasks === 0 ? 100 : Math.round((completedTasks / totalTasks) * 100);
            
            const previewText = day.tasks.length > 0 
                ? day.tasks.slice(0, 2).map(t => t.text).join(' | ') + (day.tasks.length > 2 ? '...' : '')
                : '全天休息';

            const card = document.createElement('div');
            card.className = `day-card ${day.isRest ? 'rest-day' : ''}`;
            card.onclick = () => openDetail(index);

            card.innerHTML = `
                <div class="day-header">
                    <span class="day-date">${day.date} ${day.isRest ? '🌿 休息日' : '📝 备考日'}</span>
                    <span class="day-status">完成度 ${progressPercent}%</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" style="width: ${progressPercent}%"></div>
                </div>
                <div class="task-preview">${previewText}</div>
            `;
            listContainer.appendChild(card);
        });
        
        renderTimeline(); // 每次渲染列表也同步更新顶部圆圈
    }

    function openDetail(index) {
        currentActiveDate = index;
        document.getElementById('list-view').style.display = 'none';
        document.getElementById('settings-wrap').style.display = 'none';
        document.getElementById('detail-view').style.display = 'block';
        window.scrollTo(0, 0);
        renderDetail();
    }

    function goBack() {
        document.getElementById('detail-view').style.display = 'none';
        document.getElementById('list-view').style.display = 'flex';
        document.getElementById('settings-wrap').style.display = 'block';
        currentActiveDate = null;
        renderList(); 
    }

    function renderDetail() {
        if (currentActiveDate === null) return;
        const dayData = scheduleData[currentActiveDate];
        updateDetailProgress(dayData);
        document.getElementById('detail-date-title').innerText = `${dayData.date}`;
        
        const container = document.getElementById('detail-tasks');
        container.innerHTML = '';

        if (dayData.tasks.length === 0) {
            container.innerHTML = '<div class="empty-state">今天没有任何任务，好好休息吧！☕</div>';
            return;
        }

        const englishTasks = dayData.tasks.filter(t => t.subject === 'english');
        const mathTasks = dayData.tasks.filter(t => t.subject === 'math');
        const profTasks = dayData.tasks.filter(t => t.subject === 'prof');

        if (englishTasks.length > 0) container.appendChild(createTaskGroup('📚 英语 (六级 & 单词)', englishTasks));
        if (mathTasks.length > 0) container.appendChild(createTaskGroup('📐 数学', mathTasks));
        if (profTasks.length > 0) container.appendChild(createTaskGroup('💻 专业课', profTasks));
    }

    function updateDetailProgress(dayData) {
        const totalTasks = dayData.tasks.length;
        const completedTasks = dayData.tasks.filter(t => t.done).length;
        const progressPercent = totalTasks === 0 ? 100 : Math.round((completedTasks / totalTasks) * 100);
        document.getElementById('detail-progress-text').innerText = `已完成 ${progressPercent}%`;
    }

    function createTaskGroup(title, tasks) {
        const group = document.createElement('div');
        group.className = 'task-group';
        
        const titleEl = document.createElement('div');
        titleEl.className = 'task-group-title';
        titleEl.innerText = title;
        group.appendChild(titleEl);

        tasks.forEach(task => {
            const item = document.createElement('div');
            item.className = 'task-item';
            
            const contentDiv = document.createElement('label');
            contentDiv.className = 'task-content';
            
            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.className = 'checkbox';
            checkbox.checked = task.done;
            checkbox.onchange = (e) => toggleTask(task.id, e.target.checked);

            const textWrapper = document.createElement('div');
            textWrapper.className = 'task-text-wrapper';
            
            const label = document.createElement('span');
            label.className = 'task-label';
            label.innerText = task.text;
            textWrapper.appendChild(label);

            // 如果有备注，显示备注内容
            if (task.note && task.note.trim() !== '') {
                const noteEl = document.createElement('div');
                noteEl.className = 'task-note';
                noteEl.innerText = `💡 ${task.note}`;
                textWrapper.appendChild(noteEl);
            }

            contentDiv.appendChild(checkbox);
            contentDiv.appendChild(textWrapper);

            // 右侧操作区：备注 + 修改 + 删除
            const actionsDiv = document.createElement('div');
            actionsDiv.className = 'task-actions';

            const noteBtn = document.createElement('button');
            noteBtn.className = 'icon-btn';
            noteBtn.innerText = '📝';
            noteBtn.onclick = () => addNote(task.id, task.note);

            const editBtn = document.createElement('button');
            editBtn.className = 'icon-btn';
            editBtn.innerText = '✏️';
            editBtn.onclick = () => editTask(task.id, task.text);

            const delBtn = document.createElement('button');
            delBtn.className = 'icon-btn';
            delBtn.innerText = '🗑️';
            delBtn.onclick = () => deleteTask(task.id);

            actionsDiv.appendChild(noteBtn);
            actionsDiv.appendChild(editBtn);
            actionsDiv.appendChild(delBtn);

            item.appendChild(contentDiv);
            item.appendChild(actionsDiv);
            group.appendChild(item);
        });

        return group;
    }

    function toggleTask(taskId, isDone) {
        const dayData = scheduleData[currentActiveDate];
        const task = dayData.tasks.find(t => t.id === taskId);
        if (task) {
            task.done = isDone;
            saveData();
            updateDetailProgress(dayData);
            renderTimeline(); // 更新顶部圆圈状态
        }
    }

    function addNewTask() {
        const subject = document.getElementById('new-task-subject').value;
        const textInput = document.getElementById('new-task-text');
        const text = textInput.value.trim();
        if (!text) { alert('请输入任务内容！'); return; }

        const dayData = scheduleData[currentActiveDate];
        dayData.tasks.push({ id: `custom-${Date.now()}`, subject: subject, text: text, done: false, note: '' });
        textInput.value = ''; 
        saveData();
        renderDetail(); 
        renderTimeline();
    }

    function editTask(taskId, oldText) {
        const newText = prompt('修改任务内容：', oldText);
        if (newText !== null && newText.trim() !== '') {
            const task = scheduleData[currentActiveDate].tasks.find(t => t.id === taskId);
            if (task) { task.text = newText.trim(); saveData(); renderDetail(); }
        }
    }

    function addNote(taskId, oldNote) {
        const newNote = prompt('添加复盘备注/错题记录（留空则删除备注）：', oldNote || '');
        if (newNote !== null) {
            const task = scheduleData[currentActiveDate].tasks.find(t => t.id === taskId);
            if (task) { task.note = newNote.trim(); saveData(); renderDetail(); }
        }
    }

    function deleteTask(taskId) {
        if (confirm('确定要删除这个任务吗？')) {
            const dayData = scheduleData[currentActiveDate];
            const taskIndex = dayData.tasks.findIndex(t => t.id === taskId);
            if (taskIndex > -1) {
                dayData.tasks.splice(taskIndex, 1);
                saveData(); renderDetail(); renderTimeline();
            }
        }
    }

    /* --- 设置与备份逻辑 --- */
    function openSettings() {
        document.getElementById('settings-modal').style.display = 'flex';
        document.getElementById('backup-data').value = JSON.stringify(scheduleData);
    }
    function closeSettings() {
        document.getElementById('settings-modal').style.display = 'none';
    }
    function copyBackup() {
        const textarea = document.getElementById('backup-data');
        textarea.select();
        document.execCommand('copy');
        alert('数据已复制到剪贴板！你可以将这段文字保存在备忘录中。');
    }
    function restoreBackup() {
        const jsonStr = document.getElementById('backup-data').value.trim();
        if(!jsonStr) { alert('请先粘贴备份数据！'); return; }
        try {
            const parsedData = JSON.parse(jsonStr);
            if(Array.isArray(parsedData) && parsedData.length > 0) {
                scheduleData = parsedData;
                saveData();
                closeSettings();
                renderList();
                alert('进度恢复成功！');
            } else { alert('数据格式不正确！'); }
        } catch(e) {
            alert('粘贴的内容不是有效的数据代码，请检查！');
        }
    }

    /* --- 每日抽卡逻辑 --- */
    function checkDailyCard() {
        const todayStr = new Date().toLocaleDateString();
        const lastDraw = localStorage.getItem('nd_last_draw_date');
        
        if (lastDraw !== todayStr) {
            // 今天还没抽过卡，显示弹窗
            const randomQuote = dailyCards[Math.floor(Math.random() * dailyCards.length)];
            document.getElementById('daily-card-content').innerText = randomQuote;
            document.getElementById('card-modal').style.display = 'flex';
            // 记录今天已抽
            localStorage.setItem('nd_last_draw_date', todayStr);
        }
    }
    function closeCardModal() {
        document.getElementById('card-modal').style.display = 'none';
    }

    // 启动应用
    initData();
    renderList();
    // 延迟一点显示抽卡，让页面先加载完
    setTimeout(checkDailyCard, 500);

</script>
</body>
</html>
