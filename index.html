var words=JSON.parse(localStorage.getItem(‘wd’)||’[]’);
var mode=‘math’,tv=‘today’,selIdx=null;

function sv(){localStorage.setItem(‘ck’,JSON.stringify(ck));localStorage.setItem(‘ei’,JSON.stringify(ei));localStorage.setItem(‘mk’,JSON.stringify(mistakes));localStorage.setItem(‘wd’,JSON.stringify(words));}

function showPg(p){
document.getElementById(‘sp’).style.display=p===‘s’?‘block’:‘none’;
document.getElementById(‘tp’).style.display=p===‘t’?‘block’:‘none’;
var tabs=document.querySelectorAll(’.btab’);
tabs[0].classList.toggle(‘on’,p===‘s’);
tabs[1].classList.toggle(‘on’,p===‘t’);
if(p===‘t’)renderT();
}

function gp(day){
var total=0,done=0;
for(var ti=0;ti<day.tasks.length;ti++){
for(var ii=0;ii<day.tasks[ti].items.length;ii++){
total++;
if(ck[day.date+’-’+ti+’-’+ii])done++;
}
}
return {total:total,done:done};
}

function renderSL(){
var el=document.getElementById(‘sl’);
var html=’’;
for(var idx=0;idx<studyPlan.length;idx++){
var day=studyPlan[idx];
var p=gp(day),pct=p.total?Math.round(p.done/p.total*100):0;
var pc=PC[day.phase]||’#6b6b8a’;
var hr=false;
for(var i=0;i<day.tasks.length;i++){if(day.tasks[i].subject.indexOf(‘复盘’)>-1){hr=true;break;}}
var pills=’’;
if(day.rest){
pills=’<span style="color:#3a3a5a;font-size:12px">休息</span>’;
} else {
for(var i=0;i<day.tasks.length;i++){
var t=day.tasks[i];
pills+=’<span class="dpill" style="background:'+t.color+'18;color:'+t.color+'">’+t.subject.replace(‘六级·’,’’)+’ ‘+t.time+’</span>’;
}
}
var prg=day.rest?’’:’<div class="prg"><div class="pnum'+(pct===100?' ok':'')+'">’+  (pct===100?‘✓’:pct+’%’)+’</div><div class="pbg"><div class="pfill" style="width:'+pct+'%"></div></div></div>’;
html+=’<div class="daycard'+(day.rest?' rest':'')+'" onclick="showD('+idx+')">’
+’<div class="pbar" style="background:'+pc+'"></div>’
+’<div class="ddate"><div class="dnum" style="color:'+(day.note?'#f7c87e':'#e8e4d9')+'">’+day.date.slice(3)+’</div><div class="dwd">’+day.day+’</div></div>’
+’<div class="dinfo"><div class="plabel" style="color:'+pc+'">’+day.phase+(hr?’ <span style="color:#f77e7e">·复盘</span>’:’’)+(day.note?’ <span style="color:#f7c87e">·’+day.note+’</span>’:’’)+’</div><div class="dpills">’+pills+’</div></div>’
+prg+’</div>’;
}
el.innerHTML=html;
}

function showD(idx){
selIdx=idx;
var day=studyPlan[idx],pc=PC[day.phase]||’#6b6b8a’,p=gp(day);
document.getElementById(‘sl’).style.display=‘none’;
var sd=document.getElementById(‘sd’);
sd.style.display=‘block’;
var html=’<button class="back" onclick="closeD()">← 返回</button>’
+’<div class="dtitle">’+day.date+’ ‘+day.day+’</div>’
+’<div style="font-size:12px;font-weight:600;color:'+pc+';margin-bottom:4px">’+day.phase+’</div>’
+(day.note?’<div style="font-size:12px;color:#f7c87e;margin-bottom:12px">’+day.note+’</div>’:’’)
+(day.rest?’<div style="font-size:13px;color:#4a4a6a;margin-bottom:12px">今天好好休息</div>’:’’);
for(var ti=0;ti<day.tasks.length;ti++){
var task=day.tasks[ti];
html+=’<div class="tblock" style="border:1px solid '+task.color+'28">’
+’<div class="thead"><div class="tname"><div class="tbar" style="background:'+task.color+'"></div><span style="color:'+task.color+'">’+task.subject+’</span></div><span class="ttime">’+task.time+’</span></div>’;
for(var ii=0;ii<task.items.length;ii++){
var key=day.date+’-’+ti+’-’+ii;
var isDone=!!ck[key];
var text=ei[key]||task.items[ii];
html+=’<div class="titem" onclick="tog(''+day.date+'','+ti+','+ii+')">’
+’<div class="cb" style="'+(isDone?'border-color:'+task.color+';background:'+task.color+'33':'')+'"><span style="font-size:11px;color:'+task.color+'">’+(isDone?‘✓’:’’)+’</span></div>’
+’<div class="itext'+(isDone?' done':'')+'" id="it'+key.replace(/[^a-z0-9]/gi,'')+'">’+text+’</div>’
+’</div>’;
}
html+=’</div>’;
}
html+=’<div class="dtot"><span>今日进度</span><strong class="'+(p.done===p.total&&p.total>0?'ok':'')+'">’+p.done+’/’+p.total+(p.done===p.total&&p.total>0?’ 全部完成’:’’)+’</strong></div>’;
sd.innerHTML=html;
}

function closeD(){selIdx=null;document.getElementById(‘sl’).style.display=‘block’;document.getElementById(‘sd’).style.display=‘none’;renderSL();}
function tog(date,ti,ii){var key=date+’-’+ti+’-’+ii;ck[key]=!ck[key];sv();if(selIdx!==null)showD(selIdx);}

for(var i=0;i<tabs.length;i++){
tabs[i].classList.toggle(‘on’,vs[i]===v);
tabs[i].classList.toggle(‘cet’,mode===‘cet’);
}
renderT();
}

function getDue(items,intervals){
var t=td(),res=[];
for(var i=0;i<items.length;i++){
for(var j=0;j<items[i].reviews.length;j++){
var r=items[i].reviews[j];
if(!r.done&&r.dueDate<=t)res.push({item:items[i],ri:j,r:r});
}
}
return res;
}
function getUp(items){
var t=td(),lim=addD(t,7),res=[];
for(var i=0;i<items.length;i++){
for(var j=0;j<items[i].reviews.length;j++){
var r=items[i].reviews[j];
if(!r.done&&r.dueDate>t&&r.dueDate<=lim)res.push({item:items[i],ri:j,r:r});
}
}
return res.sort(function(a,b){return a.r.dueDate<b.r.dueDate?-1:1;});
}

function renderT(){
var isMath=mode===‘math’,items=isMath?mistakes:words,t=td();
var md=getDue(mistakes,MI).length,wd=getDue(words,CI).length;
document.getElementById(‘ts’).innerHTML=’<div class="stat"><div class="v" style="color:#7eb8f7">’+mistakes.length+’</div><div class="l">错题</div></div><div class="stat"><div class="v" style="color:#c8a8f8">’+words.length+’</div><div class="l">单词</div></div><div class="stat"><div class="v" style="color:#f77e7e">’+(md+wd)+’</div><div class="l">待复盘</div></div>’;
var el=document.getElementById(‘tc’),due=getDue(items,isMath?MI:CI),up=getUp(items),ov=[];
for(var i=0;i<due.length;i++){if(due[i].r.dueDate<t)ov.push(due[i]);}
var html=’’;
if(tv===‘today’){
if(!due.length){html=’<div class="empty">今日没有需要回顾的内容</div>’;}
else{
if(ov.length)html+=’<div style="background:#2a1a1a;border:1px solid #5a2a2a;border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:12px;color:#f77e7e">有’+ov.length+‘条已逾期</div>’;
for(var i=0;i<due.length;i++)html+=rcHtml(due[i],isMath,t);
if(up.length){
html+=’<div class="upc"><div style="font-size:11px;letter-spacing:3px;color:#6b6b8a;margin-bottom:10px">近7天计划</div>’;
for(var i=0;i<up.length;i++){
var d=up[i];
html+=’<div class="upci"><div><div style="font-size:13px;color:#c8c4b9">’+(isMath?d.item.chapter+’ ‘+d.item.problem:d.item.word)+’</div><div style="font-size:11px;color:#6b6b8a;margin-top:3px">+’+d.r.interval+‘天</div></div><div class="dc" style="background:'+(isMath?'#1a2a3a':'#1a1a2a')+';color:'+(isMath?'#7eb8f7':'#c8a8f8')+'">’+fmt(d.r.dueDate)+’</div></div>’;
}
html+=’</div>’;
}
}
} else if(tv===‘add’){
html=isMath?mathForm():wordForm();
} else {
if(!items.length){html=’<div class="empty">还没有记录</div>’;}
else{for(var i=0;i<items.length;i++)html+=acHtml(items[i],isMath,t);}
}
el.innerHTML=html;
}

function rcHtml(d,isMath,t){
var ov=d.r.dueDate<t,c=isMath?’#7eb8f7’:’#c8a8f8’;
return ‘<div class="rc'+(ov?' ov':'')+'">’
+’<div><span class="badge" style="background:'+(isMath?'#1a2a3a':'#1a1a2a')+';color:'+c+'">’+(isMath?‘数学’:‘单词’)+’ +’+d.r.interval+‘天</span>’+(ov?’<span class="badge" style="background:#5a1a1a;color:#f77e7e">逾期</span>’:’’)+’</div>’
+(isMath?’<div style="font-size:14px;font-weight:600;color:#e8e4d9;margin-top:4px">’+d.item.chapter+’</div><div style="font-size:13px;color:#c8c4b9;margin-top:2px">’+d.item.problem+’</div>’
:’<div style="font-size:16px;font-weight:700;color:#e8e4d9;margin-top:4px">’+d.item.word+’</div><div style="font-size:13px;color:#c8a8f8;margin-top:3px">’+d.item.meaning+’</div>’)
+’<button class="dbtn'+(ov?' ov':'')+'" onclick="markD(''+d.item.id+'','+d.ri+','+(isMath?'1':'0')+')">✓ 标记已回顾</button></div>’;
}

function acHtml(item,isMath,t){
var done=0;for(var i=0;i<item.reviews.length;i++){if(item.reviews[i].done)done++;}
var pips=’’;
for(var i=0;i<item.reviews.length;i++){
var r=item.reviews[i];
pips+=’<div class="pip" style="background:'+(r.done?'#1e3a1e':r.dueDate<=t?'#3a1e1e':'#1e1e2e')+';border:1px solid '+(r.done?'#3a6a3a':r.dueDate<=t?'#6a3a3a':'#2a2a3a')+';color:'+(r.done?'#a8d8a8':r.dueDate<=t?'#f77e7e':'#6b6b8a')+'">+’+r.interval+‘天<br>’+(r.done?‘✓’:fmt(r.dueDate))+’</div>’;
}
return ‘<div class="acard"><div style="display:flex;justify-content:space-between">’
+(isMath?’<div><div style="font-size:14px;font-weight:600;color:#e8e4d9">’+item.chapter+’</div><div style="font-size:13px;color:#7eb8f7;margin-top:2px">’+item.problem+’</div></div>’
:’<div><div style="font-size:15px;font-weight:700;color:#e8e4d9">’+item.word+’</div><div style="font-size:13px;color:#c8a8f8;margin-top:2px">’+item.meaning+’</div></div>’)
+’<button class="xbtn" onclick="delI(''+item.id+'','+(isMath?'1':'0')+')">×</button></div>’
+’<div class="pips">’+pips+’</div><div style="font-size:11px;color:#6b6b8a;margin-top:6px">’+done+’/’+item.reviews.length+’</div></div>’;
}

function mathForm(){
var s=’<div class="fb"><div style="font-size:13px;color:#6b6b8a;margin-bottom:18px">添加数学错题</div>’
+’<div class="fld"><label>做题日期</label><input type="date" id="md" value="'+td()+'"></div>’
+’<div class="fld"><label>章节</label><select id="mc">’;
for(var i=0;i<CHAPTERS.length;i++)s+=’<option>’+CHAPTERS[i]+’</option>’;
s+=’</select></div><div class="fld"><label>题目编号</label><input type="text" id="mp" placeholder="如：第138题"></div>’
+’<div class="fld"><label>错误类型</label><div class="cg" id="mtg">’;
for(var i=0;i<MTYPES.length;i++)s+=’<button class="ch'+(i===0?' on':'')+'" onclick="selCh(this)">’+MTYPES[i]+’</button>’;
s+=’</div></div><div class="fld"><label>备注</label><input type="text" id="mn" placeholder="解题思路"></div>’
+’<div class="hint">自动安排 +3天、+7天、+14天 回顾</div>’
+’<button class="sbtn" onclick="addM()">添加错题</button></div>’;
return s;
}

function wordForm(){
var s=’<div class="fb"><div style="font-size:13px;color:#6b6b8a;margin-bottom:18px">批量添加六级单词</div>’
+’<div class="fld"><label>记录日期</label><input type="date" id="wd2" value="'+td()+'"></div>’
+’<div class="fld"><label>真题年份</label><div class="cg" id="wyg">’;
for(var i=0;i<CYEARS.length;i++)s+=’<button class="ch cet'+(i===0?' on':'')+'" onclick="selCh(this)">’+CYEARS[i]+’</button>’;
s+=’</div></div><div class="fld"><label>题型</label><div class="cg" id="wtg">’;
for(var i=0;i<CTYPES.length;i++)s+=’<button class="ch cet'+(i===0?' on':'')+'" onclick="selCh(this)">’+CTYPES[i]+’</button>’;
s+=’</div></div><div class="fld"><label>批量粘贴（每行：单词: 释义）</label><textarea id="wb" rows="6" placeholder="ambiguous: 模棱两可的" oninput="prvW()"></textarea></div>’
+’<div id="wp"></div><div class="hint cet">自动安排 +1天、+3天、+7天 回顾</div>’
+’<button class="sbtn cet" onclick="addW()">批量添加</button></div>’;
return s;
}

function selCh(el){var cg=el.parentNode;var bs=cg.querySelectorAll(’.ch’);for(var i=0;i<bs.length;i++)bs[i].classList.remove(‘on’);el.classList.add(‘on’);}
function prvW(){var b=document.getElementById(‘wb’).value,lines=b.split(’\n’);var c=0;for(var i=0;i<lines.length;i++){if(lines[i].indexOf(’:’)>-1&&lines[i].trim())c++;}var el=document.getElementById(‘wp’);el.innerHTML=c?’<div style="background:#1a1a2e;border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:12px;color:#c8a8f8">识别到 ‘+c+’ 个单词</div>’:’’;}

function mkR(date,intervals){var r=[];for(var i=0;i<intervals.length;i++)r.push({dueDate:addD(date,intervals[i]),interval:intervals[i],done:false});return r;}

function addM(){
var date=document.getElementById(‘md’).value;
var chapter=document.getElementById(‘mc’).value;
var problem=document.getElementById(‘mp’).value.trim();
var note=document.getElementById(‘mn’).value.trim();
var tg=document.getElementById(‘mtg’);
var ton=tg.querySelector(’.on’);
var type=ton?ton.textContent:MTYPES[0];
if(!problem){alert(‘请填写题目编号’);return;}
mistakes.unshift({id:’’+Date.now(),date:date,chapter:chapter,problem:problem,type:type,note:note,reviews:mkR(date,MI)});
sv();setTV(‘today’);
}

function addW(){
var date=document.getElementById(‘wd2’).value;
var wyg=document.getElementById(‘wyg’);
var year=wyg.querySelector(’.on’)?wyg.querySelector(’.on’).textContent:CYEARS[0];
var wtg=document.getElementById(‘wtg’);
var cetType=wtg.querySelector(’.on’)?wtg.querySelector(’.on’).textContent:CTYPES[0];
var bulk=document.getElementById(‘wb’).value;
var lines=bulk.split(’\n’);
var nw=[];
for(var i=0;i<lines.length;i++){
var line=lines[i];
if(line.indexOf(’:’)>-1&&line.trim()){
var ci=line.indexOf(’:’);
var w=line.slice(0,ci).trim();
var m=line.slice(ci+1).trim();
if(w&&m)nw.push({id:’’+(Date.now()+i),date:date,year:year,cetType:cetType,word:w,meaning:m,reviews:mkR(date,CI)});
}
}
if(!nw.length){alert(‘请粘贴单词’);return;}
for(var i=0;i<nw.length;i++)words.unshift(nw[i]);
sv();setTV(‘today’);
}

function markD(id,ri,isMath){
var arr=isMath?mistakes:words;
for(var i=0;i<arr.length;i++){if(arr[i].id===id){arr[i].reviews[ri].done=true;break;}}
sv();renderT();
}

function delI(id,isMath){
if(isMath){var na=[];for(var i=0;i<mistakes.length;i++){if(mistakes[i].id!==id)na.push(mistakes[i]);}mistakes=na;}
else{var na=[];for(var i=0;i<words.length;i++){if(words[i].id!==id)na.push(words[i]);}words=na;}
sv();renderT();
}

document.addEventListener(“DOMContentLoaded”, function(){
renderSL();
});
</script>
