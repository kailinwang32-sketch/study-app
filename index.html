var ck=JSON.parse(localStorage.getItem(‘ck’)||’{}’);
var ei=JSON.parse(localStorage.getItem(‘ei’)||’{}’);
var mistakes=JSON.parse(localStorage.getItem(‘mk’)||’[]’);
var words=JSON.parse(localStorage.getItem(‘wd’)||’[]’);
var mode=‘math’,tv=‘today’,selIdx=null;

function sv(){localStorage.setItem(‘ck’,JSON.stringify(ck));localStorage.setItem(‘ei’,JSON.stringify(ei));localStorage.setItem(‘mk’,JSON.stringify(mistakes));localStorage.setItem(‘wd’,JSON.stringify(words));}

function showPg(p){
document.getElementById(‘sp’).style.display=p===‘s’?‘block’:‘none’;
document.getElementById(‘tp’).style.display=p===‘t’?‘block’:‘none’;
document.querySelectorAll(’.btab’).forEach(function(b,i){b.classList.toggle(‘on’,(i===0&&p===‘s’)||(i===1&&p===‘t’));});
if(p===‘t’)renderT();
}

function gp(day,idx){
var total=0,done=0;
day.tasks.forEach(function(t,ti){t.items.forEach(function(_,ii){total++;if(ck[day.date+’-’+ti+’-’+ii])done++;});});
return {total:total,done:done};
}

function renderSL(){
var el=document.getElementById(‘sl’);
el.innerHTML=schedule.map(function(day,idx){
var p=gp(day,idx),pct=p.total?Math.round(p.done/p.total*100):0,pc=PC[day.phase]||’#6b6b8a’;
var hr=day.tasks.some(function(t){return t.subject.indexOf(‘复盘’)>-1;});
var pills=day.rest?’<span style="color:#3a3a5a;font-size:12px">🌿 休息</span>’:day.tasks.map(function(t){return ‘<span class="pill" style="background:'+t.color+'18;color:'+t.color+'">’+t.subject.replace(‘六级·’,’’)+’ ‘+t.time+’</span>’;}).join(’’);
return ‘<div class="card'+(day.rest?' rest':'')+'" onclick="showD('+idx+')">’
+’<div class="pbar" style="background:'+pc+'"></div>’
+’<div class="ddate"><div class="dnum" style="color:'+(day.note?'#f7c87e':'#e8e4d9')+'">’+day.date.slice(3)+’</div><div class="dwd">’+day.day+’</div></div>’
+’<div class="dinfo"><div class="plabel" style="color:'+pc+'">’+day.phase+(hr?’ <span style="color:#f77e7e">·复盘</span>’:’’)+(day.note?’ <span style="color:#f7c87e">·’+day.note+’</span>’:’’)+’</div><div class="pills">’+pills+’</div></div>’
+(day.rest?’’:’<div class="prg"><div class="pnum'+(pct===100?' ok':'')+'">’+  (pct===100?‘✓’:pct+’%’)+’</div><div class="pbg"><div class="pfill" style="width:'+pct+'%"></div></div></div>’)
+’</div>’;
}).join(’’);
}

function showD(idx){
selIdx=idx;
var day=schedule[idx],pc=PC[day.phase]||’#6b6b8a’,p=gp(day,idx);
document.getElementById(‘sl’).style.display=‘none’;
var sd=document.getElementById(‘sd’);
sd.style.display=‘block’;
sd.innerHTML=’<button class="back" onclick="closeD()">← 返回</button>’
+’<div class="dtitle">’+day.date+’ ‘+day.day+’</div>’
+’<div style="font-size:12px;font-weight:600;color:'+pc+';margin-bottom:4px">’+day.phase+’</div>’
+(day.note?’<div style="font-size:12px;color:#f7c87e;margin-bottom:12px">⚡ ‘+day.note+’</div>’:’’)
+(day.rest?’<div style="font-size:13px;color:#4a4a6a;margin-bottom:12px">今天好好休息 🌿</div>’:’’)
+day.tasks.map(function(task,ti){
return ‘<div class="tblock" style="border:1px solid '+task.color+'28">’
+’<div class="thead"><div class="tname"><div class="tbar" style="background:'+task.color+'"></div><span style="color:'+task.color+'">’+task.subject+’</span></div><span class="ttime">’+task.time+’</span></div>’
+task.items.map(function(item,ii){
var key=day.date+’-’+ti+’-’+ii,isDone=!!ck[key],text=ei[key]||item;
return ‘<div class="item" onclick="tog(''+day.date+'','+ti+','+ii+')">’
+’<div class="cb" style="'+(isDone?'border-color:'+task.color+';background:'+task.color+'33':'')+'"><span style="font-size:11px;color:'+task.color+'">’+(isDone?‘✓’:’’)+’</span></div>’
+’<div class="itext'+(isDone?' done':'')+'" id="it-'+key+'" ondblclick="editI(event,''+day.date+'','+ti+','+ii+',this)">’+text+’</div>’
+’</div>’;
}).join(’’)+’</div>’;
}).join(’’)
+’<div class="dtot"><span>今日进度</span><strong class="'+(p.done===p.total&&p.total>0?'ok':'')+'">’+p.done+’/’+p.total+(p.done===p.total&&p.total>0?’ · 全部完成！’:’’)+’</strong></div>’;
}

function closeD(){selIdx=null;document.getElementById(‘sl’).style.display=‘block’;document.getElementById(‘sd’).style.display=‘none’;renderSL();}

function tog(date,ti,ii){var key=date+’-’+ti+’-’+ii;ck[key]=!ck[key];sv();if(selIdx!==null)showD(selIdx);}

function editI(e,date,ti,ii,el){
e.stopPropagation();
var key=date+’-’+ti+’-’+ii,cur=el.textContent;
var inp=document.createElement(‘input’);inp.value=cur;inp.style.cssText=‘flex:1;background:#0c0c10;border:1px solid #7eb8f7;border-radius:6px;padding:3px 8px;color:#e8e4d9;font-size:13px;width:100%’;
var w=document.createElement(‘div’);w.style.cssText=‘display:flex;gap:6px;flex:1’;
var ok=document.createElement(‘button’);ok.textContent=‘✓’;ok.style.cssText=‘background:#7eb8f7;border:none;border-radius:6px;padding:3px 10px;color:#0c0c10;font-weight:700;cursor:pointer;font-size:12px’;
var ca=document.createElement(‘button’);ca.textContent=‘✕’;ca.style.cssText=‘background:#2a2a3a;border:none;border-radius:6px;padding:3px 8px;color:#6b6b8a;cursor:pointer;font-size:12px’;
w.appendChild(inp);w.appendChild(ok);w.appendChild(ca);
el.parentNode.replaceChild(w,el);inp.focus();
ok.onclick=function(ev){ev.stopPropagation();ei[key]=inp.value;sv();showD(selIdx);};
ca.onclick=function(ev){ev.stopPropagation();showD(selIdx);};
inp.onkeydown=function(ev){if(ev.key===‘Enter’){ei[key]=inp.value;sv();showD(selIdx);}if(ev.key===‘Escape’)showD(selIdx);};
}

// TRACKER
var MI=[3,7,14],CI=[1,3,7];
function td(){return new Date().toISOString().slice(0,10);}
function addD(d,n){var dt=new Date(d);dt.setDate(dt.getDate()+n);return dt.toISOString().slice(0,10);}
function fmt(d){return new Date(d+‘T00:00:00’).toLocaleDateString(‘zh-CN’,{month:‘numeric’,day:‘numeric’,weekday:‘short’});}

function setMode(m){
mode=m;tv=‘today’;
document.querySelectorAll(’.mbtn’).forEach(function(b,i){b.classList.toggle(‘on’,i===(m===‘math’?0:1));b.classList.toggle(‘cet’,m===‘cet’);});
renderT();
}
function setTV(v){
tv=v;
document.querySelectorAll(’.ntab’).forEach(function(b,i){
var vs=[‘today’,‘add’,‘all’];b.classList.toggle(‘on’,vs[i]===v);b.classList.toggle(‘cet’,mode===‘cet’);
});
renderT();
}

function getDue(items,intervals,t){
var res=[];
items.forEach(function(item){item.reviews.forEach(function(r,idx){if(!r.done&&r.dueDate<=t)res.push({item:item,ri:idx,r:r});});});
return res;
}
function getUp(items,intervals,t){
var lim=addD(t,7),res=[];
items.forEach(function(item){item.reviews.forEach(function(r,idx){if(!r.done&&r.dueDate>t&&r.dueDate<=lim)res.push({item:item,ri:idx,r:r});});});
return res.sort(function(a,b){return a.r.dueDate.localeCompare(b.r.dueDate);});
}

function renderT(){
var isMath=mode===‘math’,items=isMath?mistakes:words,t=td(),intervals=isMath?MI:CI;
var md=getDue(mistakes,MI,t).length,wd=getDue(words,CI,t).length;
document.getElementById(‘ts’).innerHTML=’<div class="stat"><div class="v" style="color:#7eb8f7">’+mistakes.length+’</div><div class="l">错题</div></div><div class="stat"><div class="v" style="color:#c8a8f8">’+words.length+’</div><div class="l">单词</div></div><div class="stat"><div class="v" style="color:#f77e7e">’+(md+wd)+’</div><div class="l">待复盘</div></div>’;
var el=document.getElementById(‘tc’),due=getDue(items,intervals,t),up=getUp(items,intervals,t),ov=due.filter(function(d){return d.r.dueDate<t;});
if(tv===‘today’){
if(!due.length){el.innerHTML=’<div class="empty"><div style="font-size:36px;margin-bottom:10px">✓</div>’+(isMath?‘今日没有数学错题’:‘今日没有单词’)+‘需要回顾</div>’;}
else{
var h=ov.length?’<div style="background:#2a1a1a;border:1px solid #5a2a2a;border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:12px;color:#f77e7e">⚠ 有’+ov.length+‘条已逾期</div>’:’’;
h+=due.map(function(d){return rcHtml(d,isMath,t);}).join(’’);
if(up.length){h+=’<div class="upc"><div style="font-size:11px;letter-spacing:3px;color:#6b6b8a;margin-bottom:10px">近7天计划</div>’;h+=up.map(function(d){return ‘<div class="upci"><div><div style="font-size:13px;color:#c8c4b9">’+(isMath?d.item.chapter+’ · ‘+d.item.problem:d.item.word)+’</div><div style="font-size:11px;color:#6b6b8a;margin-top:3px">+’+d.r.interval+‘天</div></div><div class="dc" style="background:'+(isMath?'#1a2a3a':'#1a1a2a')+';color:'+(isMath?'#7eb8f7':'#c8a8f8')+'">’+fmt(d.r.dueDate)+’</div></div>’;}).join(’’);h+=’</div>’;}
el.innerHTML=h;
}
} else if(tv===‘add’){
el.innerHTML=isMath?mathForm():wordForm();
} else {
if(!items.length){el.innerHTML=’<div class="empty">’+(isMath?‘还没有错题记录’:‘还没有单词记录’)+’</div>’;}
else el.innerHTML=items.map(function(item){return acHtml(item,isMath,t);}).join(’’);
}
}

function rcHtml(d,isMath,t){
var ov=d.r.dueDate<t,c=isMath?’#7eb8f7’:’#c8a8f8’;
return ‘<div class="rc'+(ov?' ov':'')+'">’
+’<div><span class="badge" style="background:'+(isMath?'#1a2a3a':'#1a1a2a')+';color:'+c+'">’+(isMath?‘📐 数学’:‘📝 单词’)+’ +’+d.r.interval+‘天</span>’+(ov?’<span class="badge" style="background:#5a1a1a;color:#f77e7e">逾期</span>’:’’)+’</div>’
+(isMath?’<div style="font-size:14px;font-weight:600;color:#e8e4d9">’+d.item.chapter+’</div><div style="font-size:13px;color:#c8c4b9;margin-top:2px">’+d.item.problem+’</div><div style="font-size:11px;color:#6b6b8a;margin-top:4px">’+d.item.type+(d.item.note?’ · ‘+d.item.note:’’)+’</div>’
:’<div style="font-size:16px;font-weight:700;color:#e8e4d9">’+d.item.word+’</div><div style="font-size:13px;color:#c8a8f8;margin-top:3px">’+d.item.meaning+’</div><div style="font-size:11px;color:#6b6b8a;margin-top:4px">’+d.item.year+‘年 · ‘+d.item.cetType+’</div>’)
+’<button class="dbtn'+(ov?' ov':'')+'" onclick="markD(''+d.item.id+'','+d.ri+','+(isMath?'true':'false')+')">✓ 标记已回顾</button></div>’;
}

function acHtml(item,isMath,t){
var done=item.reviews.filter(function(r){return r.done;}).length;
var pips=item.reviews.map(function(r,i){return ‘<div class="pip" style="background:'+(r.done?'#1e3a1e':r.dueDate<=t?'#3a1e1e':'#1e1e2e')+';border:1px solid '+(r.done?'#3a6a3a':r.dueDate<=t?'#6a3a3a':'#2a2a3a')+';color:'+(r.done?'#a8d8a8':r.dueDate<=t?'#f77e7e':'#6b6b8a')+'">+’+r.interval+‘天<br>’+(r.done?‘✓’:fmt(r.dueDate))+’</div>’;}).join(’’);
return ‘<div class="ac"><div style="display:flex;justify-content:space-between;align-items:flex-start">’
+(isMath?’<div><div style="font-size:14px;font-weight:600;color:#e8e4d9">’+item.chapter+’</div><div style="font-size:13px;color:#7eb8f7;margin-top:2px">’+item.problem+’</div><div style="font-size:11px;color:#6b6b8a;margin-top:4px">’+item.type+(item.note?’ · ‘+item.note:’’)+’ · ‘+fmt(item.date)+’</div></div>’
:’<div><div style="font-size:15px;font-weight:700;color:#e8e4d9">’+item.word+’</div><div style="font-size:13px;color:#c8a8f8;margin-top:2px">’+item.meaning+’</div><div style="font-size:11px;color:#6b6b8a;margin-top:4px">’+item.year+‘年 · ‘+item.cetType+’ · ‘+fmt(item.date)+’</div></div>’)
+’<button class="xbtn" onclick="delI(''+item.id+'','+(isMath?'true':'false')+')">×</button></div>’
+’<div class="pips">’+pips+’</div><div style="font-size:11px;color:#6b6b8a;margin-top:6px">回顾进度：’+done+’/’+item.reviews.length+’</div></div>’;
}

function mathForm(){
return ‘<div class="fb"><div style="font-size:13px;color:#6b6b8a;margin-bottom:18px">添加数学错题</div>’
+’<div class="fld"><label>做题日期</label><input type="date" id="md" value="'+td()+'"></div>’
+’<div class="fld"><label>章节</label><select id="mc">’+CHAPTERS.map(function(c){return ‘<option>’+c+’</option>’;}).join(’’)+’</select></div>’
+’<div class="fld"><label>题目编号</label><input type="text" id="mp" placeholder="如：第138题"></div>’
+’<div class="fld"><label>错误类型</label><div class="cg" id="mtg">’+MTYPES.map(function(t,i){return ‘<button class="ch'+(i===0?' on':'')+'" onclick="selCh(this)">’+t+’</button>’;}).join(’’)+’</div></div>’
+’<div class="fld"><label>备注（可选）</label><input type="text" id="mn" placeholder="解题思路或关键点"></div>’
+’<div class="hint">📅 自动安排 +3天、+7天、+14天 回顾</div>’
+’<button class="sbtn" onclick="addM()">添加错题</button></div>’;
}

function wordForm(){
return ‘<div class="fb"><div style="font-size:13px;color:#6b6b8a;margin-bottom:18px">批量添加六级单词</div>’
+’<div class="fld"><label>记录日期</label><input type="date" id="wd2" value="'+td()+'"></div>’
+’<div class="fld"><label>真题年份</label><div class="cg" id="wyg">’+CYEARS.map(function(y,i){return ‘<button class="ch cet'+(i===0?' on':'')+'" onclick="selCh(this)">’+y+’</button>’;}).join(’’)+’</div></div>’
+’<div class="fld"><label>题型</label><div class="cg" id="wtg">’+CTYPES.map(function(t,i){return ‘<button class="ch cet'+(i===0?' on':'')+'" onclick="selCh(this)">’+t+’</button>’;}).join(’’)+’</div></div>’
+’<div class="fld"><label>批量粘贴（每行一个）</label><div style="font-size:11px;color:#4a4a6a;margin-bottom:6px">格式：单词: 释义</div><textarea id="wb" rows="6" placeholder="ambiguous: 模棱两可的&#10;substantial: 大量的" oninput="prvW()"></textarea></div>’
+’<div id="wp"></div>’
+’<div class="hint cet">📅 自动安排 +1天、+3天、+7天 回顾</div>’
+’<button class="sbtn cet" onclick="addW()">批量添加</button></div>’;
}

function selCh(el){el.closest(’.cg’).querySelectorAll(’.ch’).forEach(function(c){c.classList.remove(‘on’);});el.classList.add(‘on’);}
function prvW(){var b=document.getElementById(‘wb’).value,l=b.split(’\n’).filter(function(x){return x.includes(’:’)&&x.trim();});var el=document.getElementById(‘wp’);el.innerHTML=l.length?’<div style="background:#1a1a2e;border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:12px;color:#c8a8f8">✓ 识别到 ‘+l.length+’ 个单词</div>’:b.trim()?’<div style="background:#2a1a1a;border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:12px;color:#f77e7e">⚠ 格式需为「单词: 释义」</div>’:’’;}

function mkR(date,intervals){return intervals.map(function(d){return {dueDate:addD(date,d),interval:d,done:false};});}

function addM(){
var date=document.getElementById(‘md’).value,chapter=document.getElementById(‘mc’).value,problem=document.getElementById(‘mp’).value.trim(),note=document.getElementById(‘mn’).value.trim();
var type=document.querySelector(’#mtg .ch.on’);type=type?type.textContent:MTYPES[0];
if(!problem){alert(‘请填写题目编号’);return;}
mistakes.unshift({id:Date.now()+’’,date:date,chapter:chapter,problem:problem,type:type,note:note,reviews:mkR(date,MI)});
sv();setTV(‘today’);
}

function addW(){
var date=document.getElementById(‘wd2’).value;
var year=document.querySelector(’#wyg .ch.on’);year=year?year.textContent:CYEARS[0];
var cetType=document.querySelector(’#wtg .ch.on’);cetType=cetType?cetType.textContent:CTYPES[0];
var bulk=document.getElementById(‘wb’).value,lines=bulk.split(’\n’).filter(function(l){return l.includes(’:’)&&l.trim();});
if(!lines.length){alert(‘请粘贴单词’);return;}
var nw=lines.map(function(line){var ci=line.indexOf(’:’);return {id:Date.now()+Math.random()+’’,date:date,year:year,cetType:cetType,word:line.slice(0,ci).trim(),meaning:line.slice(ci+1).trim(),reviews:mkR(date,CI)};}).filter(function(w){return w.word&&w.meaning;});
words.unshift.apply(words,nw);sv();setTV(‘today’);
}

function markD(id,ri,isMath){
var arr=isMath?mistakes:words,item=null;
for(var i=0;i<arr.length;i++){if(arr[i].id===id){item=arr[i];break;}}
if(item)item.reviews[ri].done=true;
sv();renderT();
}

function delI(id,isMath){
if(isMath)mistakes=mistakes.filter(function(m){return m.id!==id;});
else words=words.filter(function(w){return w.id!==id;});
sv();renderT();
}

try {
renderSL();
} catch(e) {
document.getElementById(‘sl’).innerHTML = ’<div style="color:#f77e7e;padding:20px;font-size:13px">Error: ’ + e.message + ‘<br><br>’ + e.stack + ‘</div>’;
}
</script>
