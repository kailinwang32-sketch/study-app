function Schedule() {
const [selected, setSelected] = useState(null);
const [checked, setChecked] = useState(() => {
try { return JSON.parse(localStorage.getItem(“sched_v4”) || “{}”); } catch { return {}; }
});

function toggleCheck(dateStr, taskIdx, itemIdx) {
const key = `${dateStr}-${taskIdx}-${itemIdx}`;
const next = { …checked, [key]: !checked[key] };
setChecked(next);
try { localStorage.setItem(“sched_v4”, JSON.stringify(next)); } catch {}
}

function getDayProgress(day) {
let total = 0, done = 0;
day.tasks.forEach((t, ti) => t.items.forEach((_, ii) => {
total++;
if (checked[`${day.date}-${ti}-${ii}`]) done++;
}));
return { total, done };
}

const selectedDay = selected !== null ? schedule[selected] : null;

const [editedItems, setEditedItems] = useState(() => {
try { return JSON.parse(localStorage.getItem(“sched_edits”) || “{}”); } catch { return {}; }
});
const [editingKey, setEditingKey] = useState(null);
const [editingVal, setEditingVal] = useState(””);

function getItemText(dateStr, ti, ii, defaultText) {
return editedItems[`${dateStr}-${ti}-${ii}`] || defaultText;
}
function startEdit(e, dateStr, ti, ii, currentText) {
e.stopPropagation();
setEditingKey(`${dateStr}-${ti}-${ii}`);
setEditingVal(currentText);
}
function saveEdit(dateStr, ti, ii) {
const key = `${dateStr}-${ti}-${ii}`;
const next = { …editedItems, [key]: editingVal };
setEditedItems(next);
try { localStorage.setItem(“sched_edits”, JSON.stringify(next)); } catch {}
setEditingKey(null);
}

const [mode, setMode] = useState(“math”); // math | cet
const [view, setView] = useState(“today”); // today | add | all

// Math state
const [mistakes, setMistakes] = useState(() => {
try { return JSON.parse(localStorage.getItem(“math_mistakes”) || “[]”); } catch { return []; }
});
const [mathForm, setMathForm] = useState({
date: today, chapter: CHAPTERS[0], problem: “”, type: MISTAKE_TYPES[0], note: “”,
});

// CET words state
const [words, setWords] = useState(() => {
try { return JSON.parse(localStorage.getItem(“cet_words”) || “[]”); } catch { return []; }
});
const [wordForm, setWordForm] = useState({
date: today, year: CET_YEARS[0], cetType: CET_TYPES[0], word: “”, meaning: “”,
});

const [toast, setToast] = useState(””);

// Inline editing
const [editingId, setEditingId] = useState(null);
const [editingField, setEditingField] = useState(null);
const [editingVal, setEditingVal] = useState(””);

function startEdit(e, id, field, val) {
e.stopPropagation();
setEditingId(id); setEditingField(field); setEditingVal(val);
}
function saveEdit(isMistake) {
if (isMistake) {
setMistakes(prev => prev.map(m => m.id === editingId ? { …m, [editingField]: editingVal } : m));
} else {
setWords(prev => prev.map(w => w.id === editingId ? { …w, [editingField]: editingVal } : w));
}
setEditingId(null); setEditingField(null);
}
function EditableText({ id, field, value, isMistake, style }) {
const isEditing = editingId === id && editingField === field;
if (isEditing) return (
<div style={{ display:“flex”, gap:6, alignItems:“center”, flex:1 }}>
<input autoFocus value={editingVal} onChange={e=>setEditingVal(e.target.value)}
onKeyDown={e=>{ if(e.key===“Enter”) saveEdit(isMistake); if(e.key===“Escape”) setEditingId(null); }}
style={{ flex:1, background:”#0f0f13”, border:“1px solid #7eb8f7”, borderRadius:6, padding:“3px 8px”, color:”#e8e4d9”, fontSize:style?.fontSize||13, fontFamily:”‘Noto Serif SC’,serif” }}
/>
<button onClick={()=>saveEdit(isMistake)} style={{ background:”#7eb8f7”, border:“none”, borderRadius:6, padding:“3px 10px”, color:”#0c0c10”, fontWeight:700, cursor:“pointer”, fontSize:12 }}>✓</button>
<button onClick={()=>setEditingId(null)} style={{ background:”#2a2a3a”, border:“none”, borderRadius:6, padding:“3px 8px”, color:”#6b6b8a”, cursor:“pointer”, fontSize:12 }}>✕</button>
</div>
);
return <span onDoubleClick={e=>startEdit(e,id,field,value)} style={{ …style, cursor:“text” }}>{value}</span>;
}

useEffect(() => { try { localStorage.setItem(“math_mistakes”, JSON.stringify(mistakes)); } catch {} }, [mistakes]);
useEffect(() => { try { localStorage.setItem(“cet_words”, JSON.stringify(words)); } catch {} }, [words]);
useEffect(() => {
if (toast) { const t = setTimeout(() => setToast(””), 2000); return () => clearTimeout(t); }
}, [toast]);

function makeReviews(date) {
return REVIEW_INTERVALS.map(d => ({ dueDate: addDays(date, d), interval: d, done: false }));
}

function addMistake() {
if (!mathForm.problem.trim()) { setToast(“请填写题目编号”); return; }
setMistakes(prev => [{ id: Date.now(), …mathForm, reviews: makeReviews(mathForm.date) }, …prev]);
setMathForm(f => ({ …f, problem: “”, note: “” }));
setToast(“已添加错题 ✓”); setView(“today”);
}

function addWord() {
const bulk = wordForm.bulk || “”;
const lines = bulk.split(”\n”).map(l => l.trim()).filter(l => l.includes(”:”) && l.trim());
if (lines.length === 0) { setToast(“请粘贴单词，格式：单词: 释义”); return; }
const newWords = lines.map(line => {
const colonIdx = line.indexOf(”:”);
const word = line.slice(0, colonIdx).trim();
const meaning = line.slice(colonIdx + 1).trim();
return { id: Date.now() + Math.random(), date: wordForm.date, year: wordForm.year, cetType: wordForm.cetType, word, meaning, reviews: makeReviews(wordForm.date) };
}).filter(w => w.word && w.meaning);
setWords(prev => […newWords, …prev]);
setWordForm(f => ({ …f, bulk: “” }));
setToast(`已添加 ${newWords.length} 个单词 ✓`); setView(“today”);
}

function markMistakeDone(id, idx) {
setMistakes(prev => prev.map(m => m.id !== id ? m : {
…m, reviews: m.reviews.map((r, i) => i === idx ? { …r, done: true } : r)
}));
}
function markWordDone(id, idx) {
setWords(prev => prev.map(w => w.id !== id ? w : {
…w, reviews: w.reviews.map((r, i) => i === idx ? { …r, done: true } : r)
}));
}

// Compute today tasks across both
function getTasks(items, isWord) {
const tasks = [];
items.forEach(item => {
item.reviews.forEach((r, idx) => {
if (!r.done && r.dueDate <= today) tasks.push({ item, reviewIdx: idx, review: r, isWord });
});
});
return tasks;
}
function getUpcoming(items, isWord) {
const limit = addDays(today, 7);
const tasks = [];
items.forEach(item => {
item.reviews.forEach((r, idx) => {
if (!r.done && r.dueDate > today && r.dueDate <= limit) tasks.push({ item, reviewIdx: idx, review: r, isWord });
});
});
return tasks;
}

const mathTasks = getTasks(mistakes, false);
const wordTasks = getTasks(words, true);
const allTodayTasks = […mathTasks, …wordTasks].sort((a, b) => a.review.dueDate.localeCompare(b.review.dueDate));
const allUpcoming = […getUpcoming(mistakes, false), …getUpcoming(words, true)].sort((a, b) => a.review.dueDate.localeCompare(b.review.dueDate));

const overdueCount = allTodayTasks.filter(t => t.review.dueDate < today).length;
const todayCount = allTodayTasks.filter(t => t.review.dueDate === today).length;

// Mode-specific tasks
const modeTasks = mode === “math” ? mathTasks : wordTasks;
const modeUpcoming = mode === “math” ? getUpcoming(mistakes, false) : getUpcoming(words, true);
const modeOverdue = modeTasks.filter(t => t.review.dueDate < today).length;

return (

fontFamily: “‘Noto Serif SC’,serif”, transition: “all 0.2s”,
}}>{m.label}</button>

</div>
{/* Stats */}
<div style={{ display: “flex”, gap: 10 }}>
{[

</div>
))}
</div>
</div>
