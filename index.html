<script>
var plan = JSON.parse(document.getElementById("jdata").textContent);
var PC = {"专项":"#7eb8f7","专项→模拟":"#a8d8a8","模拟":"#f7c87e","冲刺":"#f7a8a8","考前":"#c8a8f8","休息":"#3a3a5a"};
var ck = JSON.parse(localStorage.getItem("ck2")||"{}");
var sel = null;

function save(){localStorage.setItem("ck2",JSON.stringify(ck));}

function prog(day,idx){
  var total=0,done=0;
  for(var ti=0;ti<day.tasks.length;ti++)
    for(var ii=0;ii<day.tasks[ti].items.length;ii++){
      total++;
      if(ck[idx+"-"+ti+"-"+ii])done++;
    }
  return {total:total,done:done};
}

function renderList(){
  var html="";
  for(var i=0;i<plan.length;i++){
    var d=plan[i],pc=PC[d.phase]||"#6b6b8a",p=prog(d,i),pct=p.total?Math.round(p.done/p.total*100):0;
    html+="<div class='card"+(d.rest?" rest":"")+"' onclick='openDay("+i+")'>"
      +"<div style='width:3px;height:40px;border-radius:2px;background:"+pc+";flex-shrink:0'></div>"
      +"<div style='min-width:40px;text-align:center'>"
        +"<div style='font-size:17px;font-weight:700;color:"+(d.note?"#f7c87e":"#e8e4d9")+"'>"+d.date.slice(3)+"</div>"
        +"<div style='font-size:10px;color:#4a4a6a;margin-top:2px'>"+d.day+"</div>"
      +"</div>"
      +"<div style='flex:1'>"
        +"<div style='font-size:10px;font-weight:600;color:"+pc+";margin-bottom:4px'>"+d.phase+(d.note?" · "+d.note:"")+"</div>"
        +"<div style='font-size:12px;color:#6b6b8a'>"+(d.rest?"休息日":d.tasks.length+"个任务")+"</div>"
      +"</div>"
      +(d.rest?"":"<div style='min-width:32px;text-align:right'>"
        +"<div style='font-size:11px;font-weight:700;color:"+(pct===100?"#a8d8a8":"#3a3a5a")+"'>"+(pct===100?"✓":pct+"%")+"</div>"
        +"<div class='pbg'><div class='pfill' style='width:"+pct+"%'></div></div>"
      +"</div>")
      +"</div>";
  }
  document.getElementById("mainlist").innerHTML=html;
}

function openDay(idx){
  sel=idx;
  var day=plan[idx],pc=PC[day.phase]||"#6b6b8a",p=prog(day,idx);
  document.getElementById("mainlist").style.display="none";
  var det=document.getElementById("detail");
  det.style.display="block";
  var html="<button class='back' onclick='closeDay()'>← 返回</button>"
    +"<div style='font-size:22px;font-weight:700;margin-bottom:4px'>"+day.date+" "+day.day+"</div>"
    +"<div style='font-size:12px;font-weight:600;color:"+pc+";margin-bottom:8px'>"+day.phase+"</div>"
    +(day.note?"<div style='font-size:12px;color:#f7c87e;margin-bottom:12px'>"+day.note+"</div>":"")
    +(day.rest?"<div style='font-size:13px;color:#4a4a6a'>今天好好休息 🌿</div>":"");
  for(var ti=0;ti<day.tasks.length;ti++){
    var t=day.tasks[ti];
    html+="<div class='tblock' style='border:1px solid "+t.color+"28'>"
      +"<div style='display:flex;justify-content:space-between;align-items:center;margin-bottom:12px'>"
        +"<div style='display:flex;align-items:center;gap:8px'>"
          +"<div style='width:3px;height:16px;border-radius:2px;background:"+t.color+"'></div>"
          +"<span style='font-size:14px;font-weight:700;color:"+t.color+"'>"+t.subject+"</span>"
        +"</div>"
        +"<span style='font-size:12px;color:#4a4a6a'>"+t.time+"</span>"
      +"</div>";
    for(var ii=0;ii<t.items.length;ii++){
      var key=idx+"-"+ti+"-"+ii,done=!!ck[key];
      html+="<div class='titem' onclick='tog(""+key+"",""+t.color+"")'>"
        +"<div class='cb' id='cb"+key.replace(/-/g,"")+"' style='"+(done?"border-color:"+t.color+";background:"+t.color+"33":"")+"'>"
          +"<span style='font-size:12px;color:"+t.color+"'>"+(done?"✓":"")+"</span>"
        +"</div>"
        +"<div class='itext"+(done?" done":"")+"' id='it"+key.replace(/-/g,"")+"'>"+t.items[ii]+"</div>"
        +"</div>";
    }
    html+="</div>";
  }
  html+="<div style='background:#1a1a24;border-radius:10px;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;margin-top:4px'>"
    +"<span style='font-size:13px;color:#6b6b8a'>今日进度</span>"
    +"<strong style='font-size:14px;font-weight:700;color:"+(p.done===p.total&&p.total>0?"#a8d8a8":"#7eb8f7")+"'>"+p.done+"/"+p.total+(p.done===p.total&&p.total>0?" 全部完成":"")+"</strong>"
    +"</div>";
  det.innerHTML=html;
}

function closeDay(){
  sel=null;
  document.getElementById("mainlist").style.display="block";
  document.getElementById("detail").style.display="none";
  renderList();
}

function tog(key,color){
  ck[key]=!ck[key];
  save();
  var safeKey=key.replace(/-/g,"");
  var cb=document.getElementById("cb"+safeKey);
  var it=document.getElementById("it"+safeKey);
  if(cb){cb.style.borderColor=ck[key]?color:"";cb.style.background=ck[key]?color+"33":"";cb.innerHTML=ck[key]?"<span style='font-size:12px;color:"+color+"'>✓</span>":"";}
  if(it){it.className="itext"+(ck[key]?" done":"");}
  // update progress
  if(sel!==null){
    var p=prog(plan[sel],sel);
    var tot=document.querySelector("strong");
    if(tot)tot.innerHTML=p.done+"/"+p.total+(p.done===p.total&&p.total>0?" 全部完成":"");
  }
}

renderList();
</script>
