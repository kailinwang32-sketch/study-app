<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>备考日程表</title>
    <style>
        :root {
            --bg-color: #FAF8F5;
            --card-bg: #FFFFFF;
            --text-main: #5C544D;
            --text-light: #9E968F;
            --accent-color: #D4C4B7;
            --accent-hover: #C2B0A1;
            --success-color: #A3B899;
            --border-color: #EFEBE6;
            --danger-color: #E2A09F;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            padding: 30px 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        /* 列表页视图 */
        #list-view {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .day-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 18px 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            border: 1px solid var(--border-color);
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .day-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.04);
        }

        .day-card.rest-day {
            background-color: #FDFCFB;
            opacity: 0.8;
        }

        .day-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .day-date {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .day-status {
            font-size: 0.85rem;
            color: var(--text-light);
            background: var(--bg-color);
            padding: 4px 10px;
            border-radius: 12px;
            font-weight: 500;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background-color: var(--border-color);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .progress-fill {
            height: 100%;
            background-color: var(--success-color);
            transition: width 0.3s ease;
        }

        .task-preview {
            font-size: 0.85rem;
            color: var(--text-light);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 详情页视图 */
        #detail-view {
            display: none;
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            border: 1px solid var(--border-color);
            min-height: 400px;
        }

        .back-btn {
            background: none;
            border: none;
            color: var(--text-light);
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 20px;
            transition: color 0.2s;
        }

        .back-btn:hover {
            color: var(--text-main);
        }

        .detail-header {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px dashed var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .detail-date {
            font-size: 1.5rem;
            font-weight: 600;
        }
        
        .detail-progress {
            font-size: 0.9rem;
            color: var(--success-color);
            font-weight: 600;
        }

        .task-group {
            margin-bottom: 25px;
            background: #FAFAFA;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #F0F0F0;
        }

        .task-group-title {
            font-size: 0.95rem;
            color: var(--text-main);
            margin-bottom: 15px;
            font-weight: 600;
        }

        .task-item {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 12px;
            padding: 8px 10px;
            border-radius: 8px;
            transition: background 0.2s;
        }
        
        .task-item:last-child {
            margin-bottom: 0;
        }

        .task-item:hover {
            background-color: #FFFFFF;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }

        .task-content {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            flex: 1;
        }

        .checkbox {
            appearance: none;
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border: 2px solid var(--accent-color);
            border-radius: 5px;
            outline: none;
            cursor: pointer;
            position: relative;
            flex-shrink: 0;
            margin-top: 2px;
            transition: all 0.2s ease;
        }

        .checkbox:checked {
            background-color: var(--success-color);
            border-color: var(--success-color);
        }

        .checkbox:checked::after {
            content: '✓';
            position: absolute;
            color: white;
            font-size: 14px;
            left: 3px;
            top: -1px;
        }

        .task-label {
            font-size: 0.95rem;
            cursor: pointer;
            user-select: none;
            transition: color 0.2s;
            line-height: 1.4;
            word-break: break-all;
        }

        .task-item input:checked + .task-label {
            color: var(--text-light);
            text-decoration: line-through;
        }

        /* 增删改 操作按钮 */
        .task-actions {
            display: flex;
            gap: 8px;
            opacity: 0.7;
        }

        .icon-btn {
            background: none;
            border: none;
            font-size: 1.1rem;
            cursor: pointer;
            padding: 2px;
            color: var(--text-light);
        }

        .icon-btn:hover {
            opacity: 0.8;
            transform: scale(1.1);
        }

        /* 底部添加任务区域 */
        .add-task-container {
            margin-top: 30px;
            background: #FAFAFA;
            padding: 15px;
            border-radius: 12px;
            border: 1px dashed var(--accent-color);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .add-task-container select, 
        .add-task-container input {
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 0.95rem;
            outline: none;
            color: var(--text-main);
            background: white;
        }

        .add-task-container button {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.95rem;
            cursor: pointer;
            font-weight: 600;
        }

        .add-task-container button:active {
            background: var(--accent-hover);
        }

        .empty-state {
            text-align: center;
            color: var(--text-light);
            padding: 40px 0;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="list-view">
        </div>

        <button class="back-btn" onclick="goBack()">← 返回日程</button>

        <div id="detail-tasks">

        <div class="add-task-container">

        '5/25': ['复盘: 5/22 六级听力/写作', '复盘: 5/24 六级听力/写作①', '复盘: 5/22 数学(极限与连续)', '复盘: 5/22 专业课(系统建模)'],
        '5/26': ['复盘: 5/23 六级阅读/翻译', '复盘: 5/25 六级阅读/翻译', '复盘: 5/23 数学(一元微分)', '复盘: 5/23 专业课(时域一阶/二阶)'],

    };

    let scheduleData = [];
    let currentActiveDate = null;

    // 采用 v4 本地存储，避免新旧结构冲突
    function initData() {
        const localData = localStorage.getItem('nd_study_schedule_v4');
        if (localData) {
            scheduleData = JSON.parse(localData);
        } else {
            scheduleData = rawData.map(day => {
                let tasks = [];
                
                if (day.newWord) tasks.push({ id: `${day.date}-word`, subject: 'english', text: day.newWord, done: false });
                if (!day.isRest && day.newEng) tasks.push({ id: `${day.date}-eng`, subject: 'english', text: day.newEng, done: false });
                if (!day.isRest && day.newMath) tasks.push({ id: `${day.date}-math`, subject: 'math', text: day.newMath, done: false });
                if (!day.isRest && day.newProf) tasks.push({ id: `${day.date}-prof`, subject: 'prof', text: day.newProf, done: false });

                const reviews = reviewMap[day.date] || [];
                reviews.forEach((rev, idx) => {
                    let subj = 'english';
                    if (rev.includes('数学')) subj = 'math';
                    if (rev.includes('专业课')) subj = 'prof';
                    tasks.push({ id: `${day.date}-rev-${idx}`, subject: subj, text: rev, done: false });
                });

                return { date: day.date, isRest: day.isRest, tasks: tasks };
            });
            saveData();
        }
    }

    function saveData() {
        localStorage.setItem('nd_study_schedule_v4', JSON.stringify(scheduleData));
    }

    function renderList() {
        const listContainer = document.getElementById('list-view');
        listContainer.innerHTML = '';

        scheduleData.forEach((day, index) => {
            const totalTasks = day.tasks.length;
            const completedTasks = day.tasks.filter(t => t.done).length;
            const progressPercent = totalTasks === 0 ? 100 : Math.round((completedTasks / totalTasks) * 100);
            
            const previewText = day.tasks.length > 0 
                ? day.tasks.slice(0, 2).map(t => t.text).join(' | ') + (day.tasks.length > 2 ? '...' : '')
                : '全天休息';

            const card = document.createElement('div');
            card.className = `day-card ${day.isRest ? 'rest-day' : ''}`;
            card.onclick = () => openDetail(index);

            card.innerHTML = `
                <div class="day-header">
                    <span class="day-date">${day.date} ${day.isRest ? '🌿 休息日' : '📝 备考日'}</span>
                    <span class="day-status">完成度 ${progressPercent}%</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" style="width: ${progressPercent}%"></div>
                </div>
                <div class="task-preview">${previewText}</div>
            `;
            listContainer.appendChild(card);
        });
    }

    function openDetail(index) {
        currentActiveDate = index;
        document.getElementById('list-view').style.display = 'none';
        document.getElementById('detail-view').style.display = 'block';
        window.scrollTo(0, 0);
        renderDetail();
    }

    function goBack() {
        document.getElementById('detail-view').style.display = 'none';
        document.getElementById('list-view').style.display = 'flex';
        currentActiveDate = null;
        renderList(); 
    }

    function renderDetail() {
        if (currentActiveDate === null) return;
        
        const dayData = scheduleData[currentActiveDate];
        updateDetailProgress(dayData);
        
        document.getElementById('detail-date-title').innerText = `${dayData.date}`;
        
        const container = document.getElementById('detail-tasks');
        container.innerHTML = '';

        if (dayData.tasks.length === 0) {
            container.innerHTML = '<div class="empty-state">今天没有任何任务，好好休息吧！☕</div>';
            return;
        }

        const englishTasks = dayData.tasks.filter(t => t.subject === 'english');
        const mathTasks = dayData.tasks.filter(t => t.subject === 'math');
        const profTasks = dayData.tasks.filter(t => t.subject === 'prof');

        if (englishTasks.length > 0) container.appendChild(createTaskGroup('📚 英语 (六级 & 单词)', englishTasks));
        if (mathTasks.length > 0) container.appendChild(createTaskGroup('📐 数学', mathTasks));
        if (profTasks.length > 0) container.appendChild(createTaskGroup('💻 专业课', profTasks));
    }

    function updateDetailProgress(dayData) {
        const totalTasks = dayData.tasks.length;
        const completedTasks = dayData.tasks.filter(t => t.done).length;
        const progressPercent = totalTasks === 0 ? 100 : Math.round((completedTasks / totalTasks) * 100);
        document.getElementById('detail-progress-text').innerText = `已完成 ${progressPercent}%`;
    }

    function createTaskGroup(title, tasks) {
        const group = document.createElement('div');
        group.className = 'task-group';
        
        const titleEl = document.createElement('div');
        titleEl.className = 'task-group-title';
        titleEl.innerText = title;
        group.appendChild(titleEl);

        tasks.forEach(task => {
            const item = document.createElement('div');
            item.className = 'task-item';
            
            // 左侧内容区：打勾框 + 文字
            const contentDiv = document.createElement('label');
            contentDiv.className = 'task-content';
            
            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.className = 'checkbox';
            checkbox.checked = task.done;
            checkbox.onchange = (e) => toggleTask(task.id, e.target.checked);

            const label = document.createElement('span');
            label.className = 'task-label';
            label.innerText = task.text;

            contentDiv.appendChild(checkbox);
            contentDiv.appendChild(label);

            // 右侧操作区：修改 + 删除
            const actionsDiv = document.createElement('div');
            actionsDiv.className = 'task-actions';

            const editBtn = document.createElement('button');
            editBtn.className = 'icon-btn';
            editBtn.innerText = '✏️';
            editBtn.onclick = () => editTask(task.id, task.text);

            const delBtn = document.createElement('button');
            delBtn.className = 'icon-btn';
            delBtn.innerText = '🗑️';
            delBtn.onclick = () => deleteTask(task.id);

            actionsDiv.appendChild(editBtn);
            actionsDiv.appendChild(delBtn);

            item.appendChild(contentDiv);
            item.appendChild(actionsDiv);
            group.appendChild(item);
        });

        return group;
    }

    function toggleTask(taskId, isDone) {
        const dayData = scheduleData[currentActiveDate];
        const task = dayData.tasks.find(t => t.id === taskId);
        if (task) {
            task.done = isDone;
            saveData();
            updateDetailProgress(dayData);
        }
    }

    // 新增：动态添加任务
    function addNewTask() {
        const subject = document.getElementById('new-task-subject').value;
        const textInput = document.getElementById('new-task-text');
        const text = textInput.value.trim();

        if (!text) {
            alert('请输入任务内容！');
            return;
        }

        const dayData = scheduleData[currentActiveDate];
        // 生成唯一ID
        const newId = `custom-${Date.now()}`;
        
        dayData.tasks.push({
            id: newId,
            subject: subject,
            text: text,
            done: false
        });

        textInput.value = ''; // 清空输入框
        saveData();
        renderDetail(); // 重新渲染页面
    }

    // 新增：编辑任务
    function editTask(taskId, oldText) {
        const newText = prompt('修改任务内容：', oldText);
        if (newText !== null && newText.trim() !== '') {
            const dayData = scheduleData[currentActiveDate];
            const task = dayData.tasks.find(t => t.id === taskId);
            if (task) {
                task.text = newText.trim();
                saveData();
                renderDetail();
            }
        }
    }

    // 新增：删除任务
    function deleteTask(taskId) {
        if (confirm('确定要删除这个任务吗？')) {
            const dayData = scheduleData[currentActiveDate];
            const taskIndex = dayData.tasks.findIndex(t => t.id === taskId);
            if (taskIndex > -1) {
                dayData.tasks.splice(taskIndex, 1);
                saveData();
                renderDetail();
            }
        }
    }

    // 启动应用
    initData();
    renderList();

</script>
</body>
</html>
