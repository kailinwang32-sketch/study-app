<html lang="zh">
<head>
<meta charset="UTF-8"/>

<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>备考工具</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0c0c10;color:#e8e4d9;font-family:'PingFang SC',sans-serif;padding-bottom:70px}
.header{background:#13131f;border-bottom:1px solid #1e1e2e;padding:20px 16px 14px;position:sticky;top:0;z-index:10}
.header h1{font-size:18px;font-weight:700;margin-bottom:4px}
.header p{font-size:11px;color:#4a4a6a;letter-spacing:2px}
.tabs{display:flex;background:#13131f;border-top:1px solid #1e1e2e;position:fixed;bottom:0;left:0;right:0;z-index:10}
.tab{flex:1;padding:12px 0;border:none;background:none;color:#4a4a6a;font-size:13px;cursor:pointer;border-top:2px solid transparent}
.tab.active{color:#7eb8f7;border-top-color:#7eb8f7;font-weight:700}
.page{display:none;padding:12px 16px}
.page.active{display:block}
.day-card{background:#15151f;border-radius:12px;padding:13px 16px;margin-bottom:8px;border:1px solid #1e1e2e;cursor:pointer;display:flex;align-items:center;gap:12px}
.day-card.rest{opacity:0.6}
.phase-bar{width:3px;height:40px;border-radius:2px;flex-shrink:0}
.day-date{min-width:40px;text-align:center}
.day-date .num{font-size:17px;font-weight:700}
.day-date .wd{font-size:10px;color:#4a4a6a;margin-top:2px}
.day-info{flex:1;min-width:0}
.phase-label{font-size:10px;font-weight:600;letter-spacing:1px;margin-bottom:4px}
.task-pills{display:flex;gap:5px;flex-wrap:wrap}
.pill{font-size:10px;padding:2px 7px;border-radius:4px}
.progress-wrap{min-width:32px;text-align:right}
.progress-num{font-size:11px;font-weight:700;color:#3a3a5a}
.progress-num.done{color:#a8d8a8}
.progress-bar-bg{width:32px;height:3px;background:#1e1e2e;border-radius:2px;margin-top:4px}
.progress-bar-fill{height:100%;background:#a8d8a8;border-radius:2px;transition:width 0.3s}
.detail{display:none;padding:12px 16px}
.detail.active{display:block}
.back-btn{background:none;border:none;color:#6b6b8a;font-size:13px;cursor:pointer;padding:0 0 16px 0}
.detail-title{font-size:22px;font-weight:700;margin-bottom:4px}
.detail-phase{font-size:12px;font-weight:600;margin-bottom:4px}
.detail-note{font-size:12px;color:#f7c87e;margin-bottom:12px}
.task-block{background:#15151f;border-radius:12px;padding:16px;margin-bottom:12px}
.task-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.task-name{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:700}
.task-bar{width:3px;height:16px;border-radius:2px}
.task-time{font-size:12px;color:#4a4a6a}
.task-item{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid #1a1a24;cursor:pointer}
.task-item:last-child{border-bottom:none}
.checkbox{width:18px;height:18px;border-radius:5px;border:1.5px solid #2a2a3a;background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:all 0.2s}
.checkbox.checked{background:rgba(126,184,247,0.2);border-color:#7eb8f7}
.item-text{flex:1;font-size:13px;color:#c8c4b9;line-height:1.6}
.item-text.done{color:#3a3a5a;text-decoration:line-through}
.day-total{background:#1a1a24;border-radius:10px;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;margin-top:4px}
.day-total span{font-size:13px;color:#6b6b8a}
.day-total strong{font-size:14px;font-weight:700;color:#7eb8f7}
.day-total strong.done{color:#a8d8a8}
/* Tracker styles */
.mode-switch{display:flex;gap:8px;margin:12px 16px}
.mode-btn{flex:1;padding:10px 0;border-radius:10px;border:none;background:#1e1e2e;color:#6b6b8a;font-size:13px;cursor:pointer;font-weight:400}
.mode-btn.active{background:#7eb8f7;color:#0c0c10;font-weight:700}
.mode-btn.active.cet{background:#c8a8f8}
.nav-tabs{display:flex;gap:8px;padding:0 16px 12px}
.nav-tab{flex:1;padding:10px 0;border-radius:10px;border:none;background:#1e1e2e;color:#6b6b8a;font-size:13px;cursor:pointer}
.nav-tab.active{background:#7eb8f7;color:#0c0c10;font-weight:700}
.nav-tab.active.cet{background:#c8a8f8}
.tracker-content{padding:0 16px}
.today-empty{text-align:center;padding:50px 20px;color:#6b6b8a;font-size:14px}
.review-card{background:#15151f;border-radius:12px;padding:14px;margin-bottom:10px;border:1px solid #2a2a3a}
.review-card.overdue{background:#1e1218;border-color:#5a2a3a}
.badge{font-size:10px;padding:2px 8px;border-radius:4px;margin-right:6px;margin-bottom:6px;display:inline-block}
.done-btn{margin-top:12px;width:100%;padding:10px;border-radius:8px;border:none;background:#1e3a2a;color:#a8d8a8;font-size:13px;cursor:pointer;font-weight:600}
.done-btn.overdue{background:#5a2a2a;color:#f7a8a8}
.form-block{background:#1a1a24;border-radius:14px;padding:20px;border:1px solid #2a2a3a}
.field{margin-bottom:16px}
.field label{display:block;font-size:11px;color:#6b6b8a;margin-bottom:6px;letter-spacing:1px}
.field input,.field select,.field textarea{width:100%;padding:10px 12px;border-radius:8px;background:#0f0f13;border:1px solid #2a2a3a;color:#e8e4d9;font-size:13px;font-family:inherit}
.field textarea{resize:vertical;line-height:1.7}
.chip-group{display:flex;gap:8px;flex-wrap:wrap}
.chip{padding:7px 14px;border-radius:8px;border:none;background:#2a2a3a;color:#6b6b8a;font-size:12px;cursor:pointer;font-family:inherit}
.chip.active{background:#7eb8f7;color:#0c0c10;font-weight:700}
.chip.active.cet{background:#c8a8f8}
.submit-btn{width:100%;padding:14px;border-radius:10px;border:none;background:#7eb8f7;color:#0c0c10;font-weight:700;font-size:15px;cursor:pointer;font-family:inherit}
.submit-btn.cet{background:#c8a8f8}
.hint{background:#1e2a1e;border-radius:10px;padding:10px 14px;margin-bottom:18px;font-size:12px;color:#a8d8a8}
.hint.cet{background:#1e1a2e;color:#c8a8f8}
.all-card{background:#1a1a24;border-radius:12px;padding:14px;margin-bottom:10px;border:1px solid #2a2a3a}
.review-pips{display:flex;gap:6px;margin-top:10px}
.pip{flex:1;padding:5px 0;border-radius:6px;text-align:center;font-size:10px}
.del-btn{background:none;border:none;color:#4a4a5a;cursor:pointer;font-size:16px;padding:0 4px}
.stats{display:flex;gap:10px;margin-top:10px}
.stat{flex:1;background:#1e1e2e;border-radius:8px;padding:8px 4px;text-align:center;border:1px solid #2a2a3a}
.stat .val{font-size:18px;font-weight:700}
.stat .lbl{font-size:10px;color:#6b6b8a;margin-top:2px}
.upcoming-section{margin-top:24px}
.upcoming-title{font-size:11px;letter-spacing:3px;color:#6b6b8a;margin-bottom:10px;font-family:monospace}
.upcoming-item{background:#1a1a24;border-radius:10px;padding:12px 14px;margin-bottom:8px;border:1px solid #2a2a3a;display:flex;justify-content:space-between;align-items:center}
.date-chip{font-size:12px;padding:4px 10px;border-radius:8px}
</style>

let checked = JSON.parse(localStorage.getItem('checked')||'{}');
let editedItems = JSON.parse(localStorage.getItem('editedItems')||'{}');

let words = JSON.parse(localStorage.getItem('words')||'[]');
let currentMode = 'math';
let currentTrackerView = 'today';
let selectedDayIdx = null;

function save(){
  localStorage.setItem('checked', JSON.stringify(checked));
  localStorage.setItem('editedItems', JSON.stringify(editedItems));
  localStorage.setItem('mistakes', JSON.stringify(mistakes));
  localStorage.setItem('words', JSON.stringify(words));
}

// ── PAGES ──
function showPage(p){
  document.getElementById('schedule-page').style.display = p==='schedule'?'block':'none';
  document.getElementById('tracker-page').style.display = p==='tracker'?'block':'none';
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active', (i===0&&p==='schedule')||(i===1&&p==='tracker')));
  if(p==='tracker') renderTracker();
}

// ── SCHEDULE ──
function getDayProgress(day, idx){
  let total=0,done=0;
  day.tasks.forEach((t,ti)=>t.items.forEach((_,ii)=>{
    total++;
    if(checked[day.date+'-'+ti+'-'+ii]) done++;
  }));
  return {total,done};
}

function renderScheduleList(){
  const el = document.getElementById('schedule-list');
  el.innerHTML = schedule.map((day,idx)=>{
    const {total,done} = getDayProgress(day,idx);
    const pct = total ? Math.round(done/total*100) : 0;
    const pc = PHASE_COLOR[day.phase]||'#6b6b8a';
    const hasReview = day.tasks.some(t=>t.subject.includes('复盘'));
    const pills = day.rest ? '<span style="color:#3a3a5a;font-size:12px">🌿 休息，充电</span>' :
      day.tasks.map(t=>'<span class="pill" style="background:'+t.color+'18;color:'+t.color+'">'+t.subject.replace('六级·','')+(t.time?' '+t.time:'')+'</span>').join('');
    return '<div class="day-card'+(day.rest?' rest':'')+'" onclick="showDetail('+idx+')">'
      +'<div class="phase-bar" style="background:'+pc+'"></div>'
      +'<div class="day-date"><div class="num" style="color:'+(day.note?'#f7c87e':'#e8e4d9')+'">'+day.date.slice(3)+'</div><div class="wd">'+day.day+'</div></div>'
      +'<div class="day-info"><div class="phase-label" style="color:'+pc+'">'+day.phase+(hasReview?' <span style="color:#f77e7e">· 含复盘</span>':'')+(day.note?' <span style="color:#f7c87e">· '+day.note+'</span>':'')+'</div>'
      +'<div class="task-pills">'+pills+'</div></div>'
      +(day.rest?'':'<div class="progress-wrap"><div class="progress-num'+(pct===100?' done':'')+'>'+(pct===100?'✓':pct+'%')+'</div><div class="progress-bar-bg"><div class="progress-bar-fill" style="width:'+pct+'%"></div></div></div>')
      +'</div>';
  }).join('');
}

function showDetail(idx){
  selectedDayIdx = idx;
  const day = schedule[idx];
  document.getElementById('schedule-list').style.display='none';
  const det = document.getElementById('schedule-detail');
  det.style.display='block';
  const pc = PHASE_COLOR[day.phase]||'#6b6b8a';
  const {total,done} = getDayProgress(day,idx);
  det.innerHTML = '<button class="back-btn" onclick="closeDetail()">← 返回</button>'
    +'<div class="detail-title">'+day.date+' '+day.day+'</div>'
    +'<div class="detail-phase" style="color:'+pc+'">'+day.phase+'</div>'
    +(day.note?'<div class="detail-note">⚡ '+day.note+'</div>':'')
    +(day.rest?'<p style="color:#4a4a6a;font-size:13px;margin-bottom:12px">今天好好休息 🌿</p>':'')
    +day.tasks.map((task,ti)=>{
      return '<div class="task-block" style="border-color:'+task.color+'28">'
        +'<div class="task-header"><div class="task-name"><div class="task-bar" style="background:'+task.color+'"></div><span style="color:'+task.color+'">'+task.subject+'</span></div><span class="task-time">'+task.time+'</span></div>'
        +task.items.map((item,ii)=>{
          const key=day.date+'-'+ti+'-'+ii;
          const isDone=!!checked[key];
          const text=editedItems[key]||item;
          return '<div class="task-item" onclick="toggleCheck(\''+day.date+'\','+ti+','+ii+')">'
            +'<div class="checkbox'+(isDone?' checked':'')+'" style="'+(isDone?'border-color:'+task.color+';background:'+task.color+'33':'')+'"><span style="font-size:11px;color:'+task.color+'">'+(isDone?'✓':'')+'</span></div>'
            +'<div class="item-text'+(isDone?' done':'')+'" ondblclick="editItem(event,\''+day.date+'\','+ti+','+ii+',this)" id="item-'+key+'">'+text+'</div>'
            +'</div>';
        }).join('')
        +'</div>';
    }).join('')
    +'<div class="day-total"><span>今日进度</span><strong class="'+(done===total&&total>0?'done':'')+'">'+(done===total&&total>0?done+'/'+total+' · 全部完成！':done+'/'+total)+'</strong></div>';
}

function closeDetail(){
  selectedDayIdx=null;
  document.getElementById('schedule-list').style.display='block';
  document.getElementById('schedule-detail').style.display='none';
  renderScheduleList();
}

function toggleCheck(date,ti,ii){
  const key=date+'-'+ti+'-'+ii;
  checked[key]=!checked[key];
  save();
  if(selectedDayIdx!==null) showDetail(selectedDayIdx);
}

function editItem(e,date,ti,ii,el){
  e.stopPropagation();
  const key=date+'-'+ti+'-'+ii;
  const cur=el.textContent;
  const input=document.createElement('input');
  input.value=cur; input.style.cssText='flex:1;background:#0c0c10;border:1px solid #7eb8f7;border-radius:6px;padding:3px 8px;color:#e8e4d9;font-size:13px;font-family:inherit;width:100%';
  const wrap=document.createElement('div'); wrap.style.cssText='display:flex;gap:6px;flex:1';
  const ok=document.createElement('button'); ok.textContent='✓'; ok.style.cssText='background:#7eb8f7;border:none;border-radius:6px;padding:3px 10px;color:#0c0c10;font-weight:700;cursor:pointer;font-size:12px';
  const cancel=document.createElement('button'); cancel.textContent='✕'; cancel.style.cssText='background:#2a2a3a;border:none;border-radius:6px;padding:3px 8px;color:#6b6b8a;cursor:pointer;font-size:12px';
  wrap.appendChild(input); wrap.appendChild(ok); wrap.appendChild(cancel);
  el.parentNode.replaceChild(wrap,el);
  input.focus();
  ok.onclick=(ev)=>{ev.stopPropagation();editedItems[key]=input.value;save();showDetail(selectedDayIdx);};
  cancel.onclick=(ev)=>{ev.stopPropagation();showDetail(selectedDayIdx);};
  input.onkeydown=(ev)=>{if(ev.key==='Enter'){editedItems[key]=input.value;save();showDetail(selectedDayIdx);}if(ev.key==='Escape')showDetail(selectedDayIdx);};
}

// ── TRACKER ──
const REVIEW_INTERVALS_MATH=[3,7,14];
const REVIEW_INTERVALS_CET=[1,3,7];
function today(){return new Date().toISOString().slice(0,10);}
function addDays(d,n){const dt=new Date(d);dt.setDate(dt.getDate()+n);return dt.toISOString().slice(0,10);}
function fmtDate(d){return new Date(d+'T00:00:00').toLocaleDateString('zh-CN',{month:'numeric',day:'numeric',weekday:'short'});}

function setMode(m){
  currentMode=m;
  currentTrackerView='today';
  document.querySelectorAll('.mode-btn').forEach((b,i)=>{b.classList.toggle('active',i===(m==='math'?0:1));if(m==='cet')b.classList.add('cet');else b.classList.remove('cet');});
  renderTracker();
}

function setTrackerView(v){
  currentTrackerView=v;
  document.querySelectorAll('.nav-tab').forEach((b,i)=>{
    const views=['today','add','all'];
    b.classList.toggle('active',views[i]===v);
    if(currentMode==='cet')b.classList.add('cet');else b.classList.remove('cet');
  });
  renderTracker();
}

function renderTracker(){
  const isMath = currentMode==='math';
  const items = isMath ? mistakes : words;
  const t = today();
  const intervals = isMath ? REVIEW_INTERVALS_MATH : REVIEW_INTERVALS_CET;

  // stats
  const mathDue = getDueItems(mistakes,REVIEW_INTERVALS_MATH,t).length;
  const wordDue = getDueItems(words,REVIEW_INTERVALS_CET,t).length;
  document.getElementById('tracker-stats').innerHTML =
    '<div class="stat"><div class="val" style="color:#7eb8f7">'+mistakes.length+'</div><div class="lbl">错题</div></div>'
    +'<div class="stat"><div class="val" style="color:#c8a8f8">'+words.length+'</div><div class="lbl">单词</div></div>'
    +'<div class="stat"><div class="val" style="color:#f77e7e">'+(mathDue+wordDue)+'</div><div class="lbl">待复盘</div></div>';

  const el = document.getElementById('tracker-content');

  if(currentTrackerView==='today'){
    const due = getDueItems(items, intervals, t);
    const upcoming = getUpcoming(items, intervals, t);
    const overdue = due.filter(d=>d.review.dueDate<t);
    let html = '';
    if(due.length===0){
      html='<div class="today-empty"><div style="font-size:36px;margin-bottom:10px">✓</div>'+(isMath?'今日没有数学错题需要回顾':'今日没有单词需要回顾')+'</div>';
    } else {
      if(overdue.length) html+='<div style="background:#2a1a1a;border:1px solid #5a2a2a;border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:12px;color:#f77e7e">⚠ 有'+overdue.length+'条已逾期，请优先完成</div>';
      html+=due.map(d=>renderReviewCard(d,isMath,t)).join('');
    }
    if(upcoming.length){
      html+='<div class="upcoming-section"><div class="upcoming-title">近7天计划</div>';
      html+=upcoming.map(d=>'<div class="upcoming-item"><div><div style="font-size:13px;color:#c8c4b9">'+(isMath?d.item.chapter+' · '+d.item.problem:d.item.word)+'</div><div style="font-size:11px;color:#6b6b8a;margin-top:3px">+'+d.review.interval+'天复盘</div></div><div class="date-chip" style="background:'+(isMath?'#1a2a3a':'#1a1a2a')+';color:'+(isMath?'#7eb8f7':'#c8a8f8')+'">'+fmtDate(d.review.dueDate)+'</div></div>').join('');
      html+='</div>';
    }
    el.innerHTML=html;
  } else if(currentTrackerView==='add'){
    if(isMath) el.innerHTML=renderMathForm();
    else el.innerHTML=renderWordForm();
  } else {
    if(items.length===0){
      el.innerHTML='<div class="today-empty">'+(isMath?'还没有错题记录':'还没有单词记录')+'</div>';
    } else {
      el.innerHTML=items.map(item=>renderAllCard(item,isMath,t)).join('');
    }
  }
}

function getDueItems(items,intervals,t){
  const res=[];
  items.forEach(item=>item.reviews.forEach((r,idx)=>{
    if(!r.done&&r.dueDate<=t) res.push({item,reviewIdx:idx,review:r});
  }));
  return res;
}

function getUpcoming(items,intervals,t){
  const limit=addDays(t,7);
  const res=[];
  items.forEach(item=>item.reviews.forEach((r,idx)=>{
    if(!r.done&&r.dueDate>t&&r.dueDate<=limit) res.push({item,reviewIdx:idx,review:r});
  }));
  return res.sort((a,b)=>a.review.dueDate.localeCompare(b.review.dueDate));
}

function renderReviewCard(d,isMath,t){
  const over=d.review.dueDate<t;
  const c=isMath?'#7eb8f7':'#c8a8f8';
  return '<div class="review-card'+(over?' overdue':'')+'">'
    +'<div><span class="badge" style="background:'+(isMath?'#1a2a3a':'#1a1a2a')+';color:'+c+'">'+(isMath?'📐 数学':'📝 单词')+' · +'+d.review.interval+'天</span>'+(over?'<span class="badge" style="background:#5a1a1a;color:#f77e7e">逾期</span>':'')+'</div>'
    +(isMath?'<div style="font-size:14px;font-weight:600;color:#e8e4d9">'+d.item.chapter+'</div><div style="font-size:13px;color:#c8c4b9;margin-top:2px">'+d.item.problem+'</div><div style="font-size:11px;color:#6b6b8a;margin-top:4px">'+d.item.type+(d.item.note?' · '+d.item.note:'')+'</div>'
    :'<div style="font-size:16px;font-weight:700;color:#e8e4d9">'+d.item.word+'</div><div style="font-size:13px;color:#c8a8f8;margin-top:3px">'+d.item.meaning+'</div><div style="font-size:11px;color:#6b6b8a;margin-top:4px">'+d.item.year+'年 · '+d.item.cetType+'</div>')
    +'<button class="done-btn'+(over?' overdue':'')+'" onclick="markDone(\''+d.item.id+'\','+d.reviewIdx+','+isMath+')">✓ 标记已回顾</button>'
    +'</div>';
}

function renderAllCard(item,isMath,t){
  const done=item.reviews.filter(r=>r.done).length;
  const pips=item.reviews.map((r,i)=>'<div class="pip" style="background:'+(r.done?'#1e3a1e':r.dueDate<=t?'#3a1e1e':'#1e1e2e')+';border:1px solid '+(r.done?'#3a6a3a':r.dueDate<=t?'#6a3a3a':'#2a2a3a')+';color:'+(r.done?'#a8d8a8':r.dueDate<=t?'#f77e7e':'#6b6b8a')+'">+'+r.interval+'天<br>'+(r.done?'✓':fmtDate(r.dueDate))+'</div>').join('');
  return '<div class="all-card">'
    +'<div style="display:flex;justify-content:space-between;align-items:flex-start">'
    +(isMath?'<div><div style="font-size:14px;font-weight:600;color:#e8e4d9">'+item.chapter+'</div><div style="font-size:13px;color:#7eb8f7;margin-top:2px">'+item.problem+'</div><div style="font-size:11px;color:#6b6b8a;margin-top:4px">'+item.type+(item.note?' · '+item.note:'')+' · '+fmtDate(item.date)+'</div></div>'
    :'<div><div style="font-size:15px;font-weight:700;color:#e8e4d9">'+item.word+'</div><div style="font-size:13px;color:#c8a8f8;margin-top:2px">'+item.meaning+'</div><div style="font-size:11px;color:#6b6b8a;margin-top:4px">'+item.year+'年 · '+item.cetType+' · '+fmtDate(item.date)+'</div></div>')
    +'<button class="del-btn" onclick="deleteItem(\''+item.id+'\','+isMath+')">×</button></div>'
    +'<div class="review-pips">'+pips+'</div>'
    +'<div style="font-size:11px;color:#6b6b8a;margin-top:6px">回顾进度：'+done+'/'+item.reviews.length+'</div>'
    +'</div>';
}

function renderMathForm(){
  return '<div class="form-block">'
    +'<div style="font-size:13px;color:#6b6b8a;margin-bottom:18px;letter-spacing:1px">添加数学错题</div>'
    +'<div class="field"><label>做题日期</label><input type="date" id="m-date" value="'+today()+'"></div>'
    +'<div class="field"><label>章节</label><select id="m-chapter">'+CHAPTERS.map(c=>'<option>'+c+'</option>').join('')+'</select></div>'
    +'<div class="field"><label>题目编号</label><input type="text" id="m-problem" placeholder="如：第138题"></div>'
    +'<div class="field"><label>错误类型</label><div class="chip-group">'+MISTAKE_TYPES.map((t,i)=>'<button class="chip'+(i===0?' active':'')+'" onclick="selectChip(this,\'math-type\')">'+t+'</button>').join('')+'</div></div>'
    +'<div class="field"><label>备注（可选）</label><input type="text" id="m-note" placeholder="记录解题思路或关键点"></div>'
    +'<div class="hint">📅 自动安排 +3天、+7天、+14天 回顾</div>'
    +'<button class="submit-btn" onclick="addMistake()">添加错题</button>'
    +'</div>';
}

function renderWordForm(){
  return '<div class="form-block">'
    +'<div style="font-size:13px;color:#6b6b8a;margin-bottom:18px;letter-spacing:1px">批量添加六级单词</div>'
    +'<div class="field"><label>记录日期</label><input type="date" id="w-date" value="'+today()+'"></div>'
    +'<div class="field"><label>真题年份</label><div class="chip-group">'+CET_YEARS.map((y,i)=>'<button class="chip'+(i===0?' active cet':'')+'" onclick="selectChip(this,\'cet-year\')">'+y+'</button>').join('')+'</div></div>'
    +'<div class="field"><label>题型</label><div class="chip-group">'+CET_TYPES.map((t,i)=>'<button class="chip'+(i===0?' active cet':'')+'" onclick="selectChip(this,\'cet-type\')">'+t+'</button>').join('')+'</div></div>'
    +'<div class="field"><label>批量粘贴（每行一个）</label><div style="font-size:11px;color:#4a4a6a;margin-bottom:6px">格式：单词: 释义</div><textarea id="w-bulk" rows="6" placeholder="ambiguous: 模棱两可的&#10;substantial: 大量的&#10;persist: 坚持，持续" oninput="previewWords()"></textarea></div>'

```
+'<div id="word-preview"></div>'
+'<div class="hint cet">📅 每个单词自动安排 +1天、+3天、+7天 回顾</div>'
+'<button class="submit-btn cet" onclick="addWords()">批量添加</button>'
+'</div>';
```

}

function previewWords(){
const bulk=document.getElementById(‘w-bulk’).value;
const lines=bulk.split(’\n’).filter(l=>l.includes(’:’)&&l.trim());
const el=document.getElementById(‘word-preview’);
if(lines.length>0) el.innerHTML=’<div style="background:#1a1a2e;border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:12px;color:#c8a8f8">✓ 识别到 <strong>’+lines.length+’</strong> 个单词</div>’;
else if(bulk.trim()) el.innerHTML=’<div style="background:#2a1a1a;border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:12px;color:#f77e7e">⚠ 格式需为「单词: 释义」</div>’;
else el.innerHTML=’’;
}

function selectChip(el,group){
el.closest(’.chip-group’).querySelectorAll(’.chip’).forEach(c=>c.classList.remove(‘active’));
el.classList.add(‘active’);
}

function makeReviews(date,intervals){
return intervals.map(d=>({dueDate:addDays(date,d),interval:d,done:false}));
}

function addMistake(){
const date=document.getElementById(‘m-date’).value;
const chapter=document.getElementById(‘m-chapter’).value;
const problem=document.getElementById(‘m-problem’).value.trim();
const type=document.querySelector(’#tracker-content .chip-group .chip.active’)?.textContent||MISTAKE_TYPES[0];
const note=document.getElementById(‘m-note’).value.trim();
if(!problem){alert(‘请填写题目编号’);return;}
mistakes.unshift({id:Date.now()+’’,date,chapter,problem,type,note,reviews:makeReviews(date,REVIEW_INTERVALS_MATH)});
save(); setTrackerView(‘today’);
}

function addWords(){
const date=document.getElementById(‘w-date’).value;
const year=document.querySelector(’#tracker-content .chip-group .chip.active’)?.textContent||CET_YEARS[0];
const cetType=CET_TYPES.find(t=>document.querySelectorAll(’#tracker-content .chip-group’)[1]?.querySelector(’.chip.active’)?.textContent===t)||CET_TYPES[0];
const bulk=document.getElementById(‘w-bulk’).value;
const lines=bulk.split(’\n’).filter(l=>l.includes(’:’)&&l.trim());
if(!lines.length){alert(‘请粘贴单词’);return;}
const newWords=lines.map(line=>{
const ci=line.indexOf(’:’);
return {id:Date.now()+Math.random()+’’,date,year,cetType,word:line.slice(0,ci).trim(),meaning:line.slice(ci+1).trim(),reviews:makeReviews(date,REVIEW_INTERVALS_CET)};
}).filter(w=>w.word&&w.meaning);
words.unshift(…newWords);
save(); setTrackerView(‘today’);
}

function markDone(id,reviewIdx,isMath){
const arr=isMath?mistakes:words;
const item=arr.find(x=>x.id===id);
if(item) item.reviews[reviewIdx].done=true;
save(); renderTracker();
}

function deleteItem(id,isMath){
if(isMath) mistakes=mistakes.filter(m=>m.id!==id);
else words=words.filter(w=>w.id!==id);
save(); renderTracker();
}

// ── INIT ──
renderScheduleList();
</script>
