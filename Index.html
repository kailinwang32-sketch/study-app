<!DOCTYPE html>

<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>备考工具</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0c0c10;color:#e8e4d9;font-family:sans-serif;padding:20px}
h1{font-size:20px;margin-bottom:10px;color:#7eb8f7}
p{font-size:14px;color:#6b6b8a;line-height:1.6}
.btn{display:block;margin-top:20px;padding:14px;background:#7eb8f7;color:#0c0c10;border:none;border-radius:10px;font-size:15px;font-weight:700;width:100%;cursor:pointer}
#output{margin-top:20px;padding:14px;background:#1a1a24;border-radius:10px;font-size:13px;color:#a8d8a8}
</style>
</head>
<body>
<h1>备考工具 ✓</h1>
<p>页面加载成功！点击下面的按钮测试本地存储。</p>
<button class="btn" onclick="testStorage()">测试数据保存</button>
<div id="output"></div>
<script>
function testStorage(){
  try{
    localStorage.setItem('test','hello');
    var val=localStorage.getItem('test');
    document.getElementById('output').textContent='✓ 本地存储正常！数据可以保存。值：'+val;
  }catch(e){
    document.getElementById('output').textContent='✗ 错误：'+e.message;
  }
}
</script>
</body>
</html>
